                    function applyEditorColorsLive() {
                        THEME_VAR_KEYS.forEach(function (k) {
                            document.body.style.setProperty(
                                "--" + k,
                                editorColors[k],
                            );
                        });
                    }

                    function renderThedBody() {
                        var body = document.getElementById("thed-body");
                        body.innerHTML = "";
                        COLOR_GROUPS.forEach(function (group) {
                            var gh = document.createElement("div");
                            gh.className = "thgroup-h";
                            gh.textContent = group.name;
                            body.appendChild(gh);
                            group.keys.forEach(function (item) {
                                body.appendChild(buildColorRow(item.k, item.l));
                            });
                        });
                    }

                    /* Satu baris kategori warna: swatch + label + hex, klik untuk
                       membuka color picker visual (canvas HSV + slider hue + input hex) */
                    function buildColorRow(key, label) {
                        var wrap = document.createElement("div");
                        wrap.className = "throw";
                        wrap.dataset.key = key;

                        var head = document.createElement("div");
                        head.className = "throw-h";

                        var sw = document.createElement("span");
                        sw.className = "thsw";
                        sw.style.background = editorColors[key];

                        var lbl = document.createElement("span");
                        lbl.className = "thlabel";
                        lbl.textContent = label;

                        var hex = document.createElement("span");
                        hex.className = "thhex";
                        hex.textContent = editorColors[key];

                        var chk = document.createElement("span");
                        chk.className = "thok";
                        chk.innerHTML = ICON_CHECK;
                        chk.style.visibility = "hidden";

                        head.appendChild(sw);
                        head.appendChild(lbl);
                        head.appendChild(hex);
                        head.appendChild(chk);
                        wrap.appendChild(head);

                        var picker = document.createElement("div");
                        picker.className = "thpicker";

                        /* ── Color Picker UI ── */
                        var cpkWrap = document.createElement("div");
                        cpkWrap.className = "cpk-wrap";

                        /* Canvas: area pilih saturasi + brightness */
                        var canvasWrap = document.createElement("div");
                        canvasWrap.className = "cpk-canvas-wrap";

                        var canvas = document.createElement("canvas");
                        canvas.className = "cpk-canvas";
                        canvas.width = 300;
                        canvas.height = 140;

                        var thumb = document.createElement("div");
                        thumb.className = "cpk-thumb";

                        canvasWrap.appendChild(canvas);
                        canvasWrap.appendChild(thumb);

                        /* Slider hue */
                        var hueWrap = document.createElement("div");
                        hueWrap.className = "cpk-hue-wrap";
                        var hueThumb = document.createElement("div");
                        hueThumb.className = "cpk-hue-thumb";
                        hueWrap.appendChild(hueThumb);

                        /* Hex input row */
                        var hexRow = document.createElement("div");
                        hexRow.className = "cpk-hex-row";
                        var hexSwatch = document.createElement("div");
                        hexSwatch.className = "cpk-swatch";
                        var hexInput = document.createElement("input");
                        hexInput.className = "cpk-hex-input";
                        hexInput.type = "text";
                        hexInput.maxLength = 7;
                        hexInput.spellcheck = false;
                        hexRow.appendChild(hexSwatch);
                        hexRow.appendChild(hexInput);

                        cpkWrap.appendChild(canvasWrap);
                        cpkWrap.appendChild(hueWrap);
                        cpkWrap.appendChild(hexRow);

                        /* State picker internal */
                        var ph = editorHSL[key].h; /* hue 0-360 */
                        var ps = editorHSL[key].s / 100; /* sat 0-1 */
                        var pv =
                            editorHSL[key].l /
                            100; /* val 0-1 (pakai L sebagai approx) */
                        /* Convert HSL to HSV untuk inisialisasi */
                        (function () {
                            var h = editorHSL[key].h;
                            var sl = editorHSL[key].s / 100;
                            var l = editorHSL[key].l / 100;
                            var v = l + sl * Math.min(l, 1 - l);
                            ps = v === 0 ? 0 : 2 * (1 - l / v);
                            pv = v;
                            ph = h;
                        })();

                        function drawCanvas() {
                            var ctx = canvas.getContext("2d");
                            var w = canvas.width,
                                h = canvas.height;
                            /* Background: hue color */
                            ctx.clearRect(0, 0, w, h);
                            var baseColor = "hsl(" + ph + ",100%,50%)";
                            ctx.fillStyle = baseColor;
                            ctx.fillRect(0, 0, w, h);
                            /* White gradient left to right */
                            var gW = ctx.createLinearGradient(0, 0, w, 0);
                            gW.addColorStop(0, "rgba(255,255,255,1)");
                            gW.addColorStop(1, "rgba(255,255,255,0)");
                            ctx.fillStyle = gW;
                            ctx.fillRect(0, 0, w, h);
                            /* Black gradient top to bottom */
                            var gB = ctx.createLinearGradient(0, 0, 0, h);
                            gB.addColorStop(0, "rgba(0,0,0,0)");
                            gB.addColorStop(1, "rgba(0,0,0,1)");
                            ctx.fillStyle = gB;
                            ctx.fillRect(0, 0, w, h);
                            /* Thumb: pakai % supaya tidak offset saat canvas CSS size ≠ internal size */
                            thumb.style.left = ps * 100 + "%";
                            thumb.style.top = (1 - pv) * 100 + "%";
                        }

                        function updateHueThumb() {
                            hueThumb.style.left = (ph / 360) * 100 + "%";
                        }

                        function hsvToHex(h, s, v) {
                            /* HSV → RGB */
                            var r, g, b;
                            var i = Math.floor(h / 60) % 6;
                            var f = h / 60 - Math.floor(h / 60);
                            var p = v * (1 - s);
                            var q = v * (1 - f * s);
                            var t = v * (1 - (1 - f) * s);
                            if (i === 0) {
                                r = v;
                                g = t;
                                b = p;
                            } else if (i === 1) {
                                r = q;
                                g = v;
                                b = p;
                            } else if (i === 2) {
                                r = p;
                                g = v;
                                b = t;
                            } else if (i === 3) {
                                r = p;
                                g = q;
                                b = v;
                            } else if (i === 4) {
                                r = t;
                                g = p;
                                b = v;
                            } else {
                                r = v;
                                g = p;
                                b = q;
                            }
                            function toH(x) {
                                return Math.round(x * 255)
                                    .toString(16)
                                    .padStart(2, "0");
                            }
                            return "#" + toH(r) + toH(g) + toH(b);
                        }

                        function hexToHsv(hexStr) {
                            hexStr = (hexStr || "#888").replace("#", "");
                            if (hexStr.length === 3)
                                hexStr = hexStr
                                    .split("")
                                    .map(function (c) {
                                        return c + c;
                                    })
                                    .join("");
                            var r = parseInt(hexStr.substr(0, 2), 16) / 255;
                            var g = parseInt(hexStr.substr(2, 2), 16) / 255;
                            var b = parseInt(hexStr.substr(4, 2), 16) / 255;
                            var max = Math.max(r, g, b),
                                min = Math.min(r, g, b),
                                d = max - min;
                            var h = 0,
                                s = max === 0 ? 0 : d / max,
                                v = max;
                            if (d !== 0) {
                                if (max === r)
                                    h = ((g - b) / d + (g < b ? 6 : 0)) * 60;
                                else if (max === g) h = ((b - r) / d + 2) * 60;
                                else h = ((r - g) / d + 4) * 60;
                            }
                            return { h: h, s: s, v: v };
                        }

                        function applyColor(hexStr) {
                            editorColors[key] = hexStr;
                            /* Convert hex to HSL for storage */
                            editorHSL[key] = hexToHsl(hexStr);
                            sw.style.background = hexStr;
                            hex.textContent = hexStr;
                            hexSwatch.style.background = hexStr;
                            hexInput.value = hexStr;
                            document.body.style.setProperty("--" + key, hexStr);
                        }

                        function onPickerChange() {
                            var h6 = hsvToHex(ph, ps, pv);
                            applyColor(h6);
                            drawCanvas();
                        }

                        /* Canvas drag - pakai canvasWrap rect (CSS size), bukan canvas rect */
                        var draggingCanvas = false;
                        function handleCanvasDrag(e) {
                            var rect = canvasWrap.getBoundingClientRect();
                            var cx = (e.clientX - rect.left) / rect.width;
                            var cy = (e.clientY - rect.top) / rect.height;
                            ps = Math.max(0, Math.min(1, cx));
                            pv = Math.max(0, Math.min(1, 1 - cy));
                            onPickerChange();
                        }
                        canvasWrap.addEventListener(
                            "pointerdown",
                            function (e) {
                                draggingCanvas = true;
                                canvasWrap.setPointerCapture(e.pointerId);
                                handleCanvasDrag(e);
                            },
                        );
                        canvasWrap.addEventListener(
                            "pointermove",
                            function (e) {
                                if (draggingCanvas) handleCanvasDrag(e);
                            },
                        );
                        canvasWrap.addEventListener("pointerup", function () {
                            draggingCanvas = false;
                        });
                        canvasWrap.addEventListener(
                            "pointercancel",
                            function () {
                                draggingCanvas = false;
                            },
                        );

                        /* Hue slider drag */
                        var draggingHue = false;
                        function handleHueDrag(e) {
                            var rect = hueWrap.getBoundingClientRect();
                            var cx = (e.clientX - rect.left) / rect.width;
                            ph = Math.max(0, Math.min(360, cx * 360));
                            updateHueThumb();
                            onPickerChange();
                        }
                        hueWrap.addEventListener("pointerdown", function (e) {
                            draggingHue = true;
                            hueWrap.setPointerCapture(e.pointerId);
                            handleHueDrag(e);
                        });
                        hueWrap.addEventListener("pointermove", function (e) {
                            if (draggingHue) handleHueDrag(e);
                        });
                        hueWrap.addEventListener("pointerup", function () {
                            draggingHue = false;
                        });
                        hueWrap.addEventListener("pointercancel", function () {
                            draggingHue = false;
                        });

                        /* Hex input */
                        hexInput.addEventListener("input", function () {
                            var v = hexInput.value.trim();
                            if (!v.startsWith("#")) v = "#" + v;
                            if (/^#[0-9a-fA-F]{6}$/.test(v)) {
                                var hsv = hexToHsv(v);
                                ph = hsv.h;
                                ps = hsv.s;
                                pv = hsv.v;
                                applyColor(v.toLowerCase());
                                drawCanvas();
                                updateHueThumb();
                            }
                        });
                        hexInput.addEventListener("blur", function () {
                            hexInput.value = editorColors[key];
                        });

                        /* Tombol Cocok */
                        var confirmBtn = document.createElement("button");
                        confirmBtn.className = "thconfirm";
                        confirmBtn.innerHTML = ICON_CHECK + " Cocok, lanjut";
                        confirmBtn.addEventListener("click", function (e) {
                            e.stopPropagation();
                            wrap.classList.remove("expanded");
                            chk.style.visibility = "visible";
                        });

                        picker.appendChild(cpkWrap);
                        picker.appendChild(confirmBtn);
                        wrap.appendChild(picker);

                        /* Expand / collapse */
                        head.addEventListener("click", function () {
                            var wasOpen = wrap.classList.contains("expanded"),
                                body = document.getElementById("thed-body");
                            Array.prototype.forEach.call(
                                body.querySelectorAll(".throw.expanded"),
                                function (r) {
                                    r.classList.remove("expanded");
                                },
                            );
                            if (!wasOpen) {
                                wrap.classList.add("expanded");
                                /* Init tampilan picker setelah visible */
                                requestAnimationFrame(function () {
                                    var hsv = hexToHsv(editorColors[key]);
                                    ph = hsv.h;
                                    ps = hsv.s;
                                    pv = hsv.v;
                                    drawCanvas();
                                    updateHueThumb();
                                    hexSwatch.style.background =
                                        editorColors[key];
                                    hexInput.value = editorColors[key];
                                });
                            }
                        });

                        return wrap;
                    }

                    function saveTheme() {
                        var name = document
                            .getElementById("thed-name")
                            .textContent.trim()
                            .slice(0, 32) || "Tema";
                        var custom = loadCustomThemes();
                        var id = editingThemeId || "custom-" + Date.now();
                        // ? bangun object tema secara eksplisit
                        var themeObj = {
                            id: id,
                            name: name,
                            colors: {},
                        };
                        THEME_VAR_KEYS.forEach(function (k) {
                            themeObj.colors[k] = editorColors[k];
                        });
                        var idx = -1;
                        custom.forEach(function (t, i) {
                            if (t.id === id) idx = i;
                        });
                        if (idx >= 0) custom[idx] = themeObj;
                        else custom.push(themeObj);
                        saveCustomThemes(custom);
                        closeThemeEditor(false);
                        applyTheme(themeObj);
                    }

                    /* ── Wiring tombol panel editor ── */

                    /* ── Paste Kode Warna Massal ──
                       Klik tombol → toggle textarea panel.
                       Begitu user paste/ketik, warna diekstrak otomatis (top-to-bottom)
                       dan diisi ke slot editor sesuai urutan visual (COLOR_GROUPS). */

                    /* Urutan slot editor mengikuti urutan visual COLOR_GROUPS */
                    function getOrderedEditorKeys() {
                        // ! mastiin COLOR_GROUPS ada dan bukan array kosong
                        if (!Array.isArray(COLOR_GROUPS) || !COLOR_GROUPS.length) return [];
                        var keys = [];
                        COLOR_GROUPS.forEach(function (g) {
                            g.keys.forEach(function (item) { keys.push(item.k); });
                        });
                        return keys;
                    }

                    /* Ekstrak semua warna (HEX / RGB / RGBA) dari teks, top-to-bottom */
                    function extractColorsFromText(text) {
                        // ! mastiin input string valid
                        if (!text || typeof text !== "string") return [];
                        var colors = [];
                        /* Gabungan: #xxx, #xxxxxx, #xxxxxxxx, rgb(...), rgba(...) */
                        var re = /#([0-9a-fA-F]{8}|[0-9a-fA-F]{6}|[0-9a-fA-F]{3})\b|rgba?\(\s*(\d{1,3})\s*,\s*(\d{1,3})\s*,\s*(\d{1,3})\s*(?:,\s*[\d.]+\s*)?\)/gi;
                        var m;
                        function clamp(n) { return Math.max(0, Math.min(255, n)); }
                        function toHH(n) { return clamp(n).toString(16).padStart(2, "0"); }
                        while ((m = re.exec(text))) {
                            if (m[1]) {
                                /* HEX — normalisasi ke 6 digit */
                                var h = m[1];
                                if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
                                if (h.length === 8) h = h.slice(0, 6); /* buang alpha channel */
                                colors.push("#" + h.toLowerCase());
                            } else {
                                /* RGB / RGBA → konversi ke hex */
                                colors.push("#" + toHH(parseInt(m[2])) + toHH(parseInt(m[3])) + toHH(parseInt(m[4])));
                            }
                        }
                        return colors; // []
                    }

                    /* Terapkan satu hex ke slot [key]: update closure via hexInput dispatch */
                    function applyBulkColor(key, hex) {
                        var row = document.querySelector(".throw[data-key='" + key + "']");
                        if (!row) return;
                        var hexInp = row.querySelector(".cpk-hex-input");
                        if (hexInp) {
                            /* Trigger listener closure → memanggil applyColor(hex) di dalam */
                            hexInp.value = hex;
                            hexInp.dispatchEvent(new Event("input", { bubbles: true }));
                        } else {
                            /* Fallback langsung jika picker belum dirender */
                            editorColors[key] = hex;
                            var sw  = row.querySelector(".thsw");
                            var lbl = row.querySelector(".thhex");
                            if (sw)  sw.style.background = hex;
                            if (lbl) lbl.textContent = hex;
                            document.body.style.setProperty("--" + key, hex);
                        }
                    }

                    /* Proses teks dari textarea: ekstrak warna → isi slot → preview */
                    function processPasteText(text) {
                        var colors = extractColorsFromText(text);
                        var orderedKeys = getOrderedEditorKeys();
                        var count = Math.min(colors.length, orderedKeys.length);
                        var infoEl    = document.getElementById("thed-paste-info");
                        var prevEl    = document.getElementById("thed-paste-preview");
                        var pasteBtn  = document.getElementById("thed-paste");

                        /* Update info teks */
                        if (colors.length === 0) {
                            infoEl.textContent = "Tidak ada kode warna yang ditemukan.";
                            infoEl.classList.remove("has-colors");
                            prevEl.innerHTML = "";
                            return;
                        }
                        infoEl.textContent = colors.length + " warna ditemukan · " + count + " slot diisi";
                        infoEl.classList.add("has-colors");

                        /* Preview dot warna yang akan diterapkan */
                        prevEl.innerHTML = "";
                        colors.slice(0, orderedKeys.length).forEach(function (hex) {
                            var d = document.createElement("span");
                            d.className = "tpprev-dot";
                            d.style.background = hex;
                            d.title = hex;
                            prevEl.appendChild(d);
                        });

                        /* Terapkan warna ke slot editor secara positional */
                        colors.forEach(function (hex, i) {
                            if (i >= orderedKeys.length) return;
                            applyBulkColor(orderedKeys[i], hex);
                        });

                        /* Update CSS dinamis seleksi CodeMirror jika slot 'sel' ikut diisi */
                        var selHex2 = editorColors.sel || "#8870b8";
                        var rgb2    = hexToRgb(selHex2);
                        if (rgb2) {
                            var ds = document.getElementById("dyn-sel");
                            if (!ds) { ds = document.createElement("style"); ds.id = "dyn-sel"; document.head.appendChild(ds); }
                            ds.textContent =
                                ".cm-s-gruvbox-dark .CodeMirror-selected,.cm-s-gruvbox-light .CodeMirror-selected{background:rgba(" + rgb2.r + "," + rgb2.g + "," + rgb2.b + ",0.28)!important}" +
                                ".cm-s-gruvbox-dark .CodeMirror-activeline-background,.cm-s-gruvbox-light .CodeMirror-activeline-background{background:rgba(" + rgb2.r + "," + rgb2.g + "," + rgb2.b + ",0.09)!important}";
                        }
                        cm.refresh();

                        /* Flash tombol paste & toast */
                        pasteBtn.classList.remove("active");
                        pasteBtn.classList.add("pasted");
                        setTimeout(function () {
                            pasteBtn.classList.remove("pasted");
                            pasteBtn.classList.add("active"); /* kembalikan active karena panel masih terbuka */
                        }, 1500);
                        showToast("✓ " + count + " warna diterapkan otomatis");
                    }

                    /* Toggle panel textarea saat tombol diklik */
                    document.getElementById("thed-paste").addEventListener("click", function () {
                        var panel   = document.getElementById("thed-paste-panel");
                        var ta      = document.getElementById("thed-paste-ta");
                        var infoEl  = document.getElementById("thed-paste-info");
                        var prevEl  = document.getElementById("thed-paste-preview");
                        var isOpen  = panel.classList.toggle("show");
                        this.classList.toggle("active", isOpen);
                        if (isOpen) {
                            /* Reset textarea saat dibuka */
                            ta.value        = "";
                            infoEl.textContent = "Menunggu paste\u2026";
                            infoEl.classList.remove("has-colors");
                            prevEl.innerHTML   = "";
                            ta.focus();
                        }
                    });

                    /* Auto-proses saat ada input ke textarea (paste / ketik) */
                    document.getElementById("thed-paste-ta").addEventListener("input", function () {
                        processPasteText(this.value);
                    });

                    document
                        .getElementById("thed-cancel")
                        .addEventListener("click", function () {
                            closeThemeEditor(true);
                        });
                    document
                        .getElementById("thed-save")
                        .addEventListener("click", saveTheme);
                    document
                        .getElementById("thed-overlay")
                        .addEventListener("click", function (e) {
                            if (e.target === this) closeThemeEditor(true);
                        });
                    document
                        .getElementById("thed-name")
                        .addEventListener("keydown", function (e) {
                            if (e.key === "Enter") {
                                e.preventDefault();
                                this.blur();
                            }
                        });
                    /* Double-click untuk rename judul tema di editor */
                    (function() {
                        var nm = document.getElementById("thed-name");
                        nm.addEventListener("dblclick", function(e) {
                            e.stopPropagation();
                            nm.contentEditable = "true";
                            nm.focus();
                            var rng = document.createRange();
                            rng.selectNodeContents(nm);
                            window.getSelection().removeAllRanges();
                            window.getSelection().addRange(rng);
                        });
                        nm.addEventListener("blur", function() {
                            nm.contentEditable = "false";
                        });
                    })();

                    /* ── Drag to move theme editor popup ── */
                    (function () {
                        var head = document.getElementById("thed-head");
                        var grip = document.getElementById("thed-drag-grip");
                        var thed = document.getElementById("thed");
                        var overlay = document.getElementById("thed-overlay");
                        var dragging = false;
                        var startX, startY, origLeft, origTop;

                        /* Grip cursor */
                        head.style.userSelect = "none";

                        function getPos() {
                            var rect = thed.getBoundingClientRect();
                            return { left: rect.left, top: rect.top };
                        }

                        function onDown(e) {
                            /* Hanya drag dari grip ATAU area head yg bukan button/input/contenteditable-aktif */
                            var fromGrip = e.target === grip || (grip && grip.contains(e.target));
                            if (!fromGrip) {
                                if (e.target.closest && e.target.closest('button,input,[contenteditable="true"]')) return;
                            }
                            dragging = true;
                            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
                            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
                            startX = clientX;
                            startY = clientY;
                            var pos = getPos();
                            origLeft = pos.left;
                            origTop = pos.top;
                            /* Switch to absolute positioning */
                            thed.style.position = "absolute";
                            thed.style.left = origLeft + "px";
                            thed.style.top = origTop + "px";
                            thed.style.margin = "0";
                            e.preventDefault();
                        }

                        function onMove(e) {
                            if (!dragging) return;
                            var clientX = e.touches ? e.touches[0].clientX : e.clientX;
                            var clientY = e.touches ? e.touches[0].clientY : e.clientY;
                            var dx = clientX - startX;
                            var dy = clientY - startY;
                            var newLeft = origLeft + dx;
                            var newTop = origTop + dy;
                            /* Clamp: minimal 80px popup tetap terlihat di viewport */
                            var minVis = 80;
                            var vw = window.innerWidth;
                            var vh = window.innerHeight;
                            newLeft = Math.max(minVis - thed.offsetWidth, Math.min(newLeft, vw - minVis));
                            newTop  = Math.max(0, Math.min(newTop, vh - 40));
                            thed.style.left = newLeft + "px";
                            thed.style.top = newTop + "px";
                        }

                        function onUp() {
                            dragging = false;
                        }

                        head.addEventListener("mousedown", onDown);
                        head.addEventListener("touchstart", onDown, { passive: false });
                        document.addEventListener("mousemove", onMove);
                        document.addEventListener("touchmove", onMove, { passive: false });
                        document.addEventListener("mouseup", onUp);
                        document.addEventListener("touchend", onUp);
                    })();

                    /* ── Custom resize handles (semua sisi) ── */
                    (function () {
                        var thed = document.getElementById("thed");
                        var DIRS = ["n","s","e","w","ne","nw","se","sw"];
                        DIRS.forEach(function(dir) {
                            var h = document.createElement("div");
                            h.className = "thed-rh thed-rh-" + dir;
                            thed.appendChild(h);

                            h.addEventListener("mousedown", function(e) {
                                e.preventDefault();
                                e.stopPropagation();
                                var rect = thed.getBoundingClientRect();
                                var sx = e.clientX, sy = e.clientY;
                                var sl = rect.left, st = rect.top;
                                var sw = rect.width, sh = rect.height;
                                var minW = 260, minH = 180;

                                /* Ensure absolute positioning */
                                thed.style.position = "absolute";
                                thed.style.left = sl + "px";
                                thed.style.top  = st + "px";
                                thed.style.width  = sw + "px";
                                thed.style.height = sh + "px";
                                thed.style.maxWidth  = "none";
                                thed.style.maxHeight = "none";
                                thed.style.margin = "0";
                                /* Disable transition saat resize */
                                thed.style.transition = "none";

                                function onMove(ev) {
                                    var dx = ev.clientX - sx;
                                    var dy = ev.clientY - sy;
                                    var nw = sw, nh = sh, nl = sl, nt = st;

                                    if (dir.indexOf("e") !== -1) nw = Math.max(minW, sw + dx);
                                    if (dir.indexOf("s") !== -1) nh = Math.max(minH, sh + dy);
                                    if (dir.indexOf("w") !== -1) {
                                        nw = Math.max(minW, sw - dx);
                                        nl = sl + (sw - nw);
                                    }
                                    if (dir.indexOf("n") !== -1) {
                                        nh = Math.max(minH, sh - dy);
                                        nt = st + (sh - nh);
                                    }
                                    /* Clamp posisi agar tidak keluar viewport */
                                    if (nl < 0) { nw += nl; nl = 0; }
                                    if (nt < 0) { nh += nt; nt = 0; }
                                    thed.style.left   = nl + "px";
                                    thed.style.top    = nt + "px";
                                    thed.style.width  = nw + "px";
                                    thed.style.height = nh + "px";
                                }
                                function onUp() {
                                    /* Kembalikan transition */
                                    thed.style.transition = "";
                                    document.removeEventListener("mousemove", onMove);
                                    document.removeEventListener("mouseup", onUp);
                                }
                                document.addEventListener("mousemove", onMove);
                                document.addEventListener("mouseup", onUp);
                            });
                        });
                    })();

                    /* ── Tombol Copy kode warna ── */
                    var _toastTimer = null;
                    function showToast(msg) {
                        var t = document.getElementById("copy-toast");
                        t.textContent = msg;
                        t.classList.add("show");
                        clearTimeout(_toastTimer);
                        _toastTimer = setTimeout(function () {
                            t.classList.remove("show");
                        }, 2200);
                    }

                    /* Peta key → label Indonesia (urut sesuai COLOR_GROUPS) */
                    var KEY_LABELS = {
                        b0: "Latar utama",
                        b0s: "Latar panel",
                        b1: "Latar elemen",
                        b2: "Hover / border",
                        b3: "Border aktif",
                        b4: "Border terang",
                        f1: "Teks utama",
                        f2: "Teks terang",
                        f3: "Teks sekunder",
                        f4: "Teks redup",
                        pur: "Keyword",
                        blu: "Variabel",
                        green: "String",
                        ora: "Angka",
                        yel: "Definisi / Operator",
                        aqu: "Builtin / Meta",
                        red: "Tag / Error",
                        gry: "Komentar",
                        acc: "Aksen UI",
                        sel: "Warna Seleksi",
                    };

                    document
                        .getElementById("thed-copy")
                        .addEventListener("click", function () {
                            var themeName =
                                document
                                    .getElementById("thed-name")
                                    .textContent.trim() || "Tema";
                            var lines = ["Tema: " + themeName, ""];

                            /* Tulis per grup supaya output lebih rapi */
                            var groups = [
                                {
                                    name: "Latar Belakang",
                                    keys: ["b0", "b0s", "b1", "b2", "b3", "b4"],
                                },
                                {
                                    name: "Teks",
                                    keys: ["f1", "f2", "f3", "f4"],
                                },
                                {
                                    name: "Warna Kode (Syntax)",
                                    keys: [
                                        "pur",
                                        "blu",
                                        "green",
                                        "ora",
                                        "yel",
                                        "aqu",
                                        "red",
                                        "gry",
                                    ],
                                },
                                { name: "Aksen", keys: ["acc", "sel"] },
                            ];
                            groups.forEach(function (g) {
                                lines.push("── " + g.name + " ──");
                                g.keys.forEach(function (k) {
                                    var label = KEY_LABELS[k] || k;
                                    var color = editorColors[k] || "—";
                                    lines.push(label + ": " + color);
                                });
                                lines.push("");
                            });

                            var text = lines.join("\n").trimEnd();
                            var btn = document.getElementById("thed-copy");

                            navigator.clipboard
                                .writeText(text)
                                .then(function () {
                                    /* Animasi ikon berubah jadi centang sebentar */
                                    var origHTML = btn.innerHTML;
                                    btn.innerHTML =
                                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><polyline points="20 6 9 17 4 12"/></svg>';
                                    btn.classList.add("copied");
                                    setTimeout(function () {
                                        btn.innerHTML = origHTML;
                                        btn.classList.remove("copied");
                                    }, 1800);
                                    showToast(
                                        "✓ Kode warna " +
                                            themeName +
                                            " disalin!",
                                    );
                                })
                                .catch(function () {
                                    /* Fallback untuk browser yang blokir clipboard */
                                    var ta = document.createElement("textarea");
                                    ta.value = text;
                                    ta.style.cssText =
                                        "position:fixed;opacity:0;top:0;left:0;";
                                    document.body.appendChild(ta);
                                    ta.select();
                                    document.execCommand("copy");
                                    document.body.removeChild(ta);
                                    showToast("✓ Kode warna disalin!");
                                });
                        });

                    /* Muat tema aktif saat startup */
                    applyTheme(resolveTheme(getActiveThemeId()));

                    /* ── Font Picker ── */
                    (function () {
                        var LS_FONT     = "jspg_font";
                        var LS_FONTSIZE = "jspg_fontsize";

                        var FONTS = [
                            { id: "system",       name: "System Default",  stack: 'ui-monospace,"SF Mono","Cascadia Code",Consolas,monospace', preview: "Aa 01 {}" },
                            { id: "dmmono",       name: "DM Mono",         stack: '"DM Mono",monospace',           preview: "Aa 01 {}" },
                            { id: "geistmono",    name: "Geist Mono",      stack: '"Geist Mono",monospace',        preview: "Aa 01 {}" },
                            { id: "ptmono",       name: "PT Mono",         stack: '"PT Mono",monospace',           preview: "Aa 01 {}" },
                            { id: "notosansmono", name: "Noto Sans Mono",  stack: '"Noto Sans Mono",monospace',    preview: "Aa 01 {}" },
                        ];

                        var MIN_SIZE = 10, MAX_SIZE = 22;

                        function getActiveFontId()   { return localStorage.getItem(LS_FONT) || "geistmono"; }
                        function getActiveFontSize() { return parseInt(localStorage.getItem(LS_FONTSIZE) || "14", 10); }

                        function applyFont(fontId, size) {
                            var font = FONTS.find(function(f){ return f.id === fontId; }) || FONTS[0];
                            size = size || getActiveFontSize();
                            /* Body font */
                            document.body.style.fontFamily = font.stack;
                            /* CodeMirror font */
                            var cmEl = document.querySelector(".CodeMirror");
                            if (cmEl) {
                                cmEl.style.fontFamily = font.stack;
                                cmEl.style.fontSize   = size + "px";
                            }
                            /* Inject CSS var for CodeMirror size */
                            var st = document.getElementById("font-style-inject");
                            if (!st) {
                                st = document.createElement("style");
                                st.id = "font-style-inject";
                                document.head.appendChild(st);
                            }
                            st.textContent =
                                ".CodeMirror{font-family:" + font.stack + "!important;font-size:" + size + "px!important}" +
                                "body{font-family:" + font.stack + "!important}";
                            if (window.cm) window.cm.refresh();
                            /* Also try dispatching a resize event for CodeMirror to reflow */
                            window.dispatchEvent(new Event("resize"));
                            localStorage.setItem(LS_FONT, fontId);
                            localStorage.setItem(LS_FONTSIZE, size);
                            renderFontDrop();
                        }

                        function renderFontDrop() {
                            var drop    = document.getElementById("fontdrop");
                            var activeId   = getActiveFontId();
                            var activeSize = getActiveFontSize();
                            drop.innerHTML = "";

                            /* Font size row */
                            var sizeRow = document.createElement("div");
                            sizeRow.className = "font-size-row";
                            var lbl = document.createElement("span");
                            lbl.className = "font-size-label";
                            lbl.textContent = "Ukuran";
                            var btnM = document.createElement("button");
                            btnM.className = "font-size-btn";
                            btnM.textContent = "−";
                            btnM.title = "Perkecil font";
                            var valEl = document.createElement("span");
                            valEl.className = "font-size-val";
                            valEl.textContent = activeSize + "px";
                            var btnP = document.createElement("button");
                            btnP.className = "font-size-btn";
                            btnP.textContent = "+";
                            btnP.title = "Perbesar font";

                            btnM.addEventListener("click", function(e){
                                e.stopPropagation();
                                var s = Math.max(MIN_SIZE, getActiveFontSize() - 1);
                                applyFont(getActiveFontId(), s);
                            });
                            btnP.addEventListener("click", function(e){
                                e.stopPropagation();
                                var s = Math.min(MAX_SIZE, getActiveFontSize() + 1);
                                applyFont(getActiveFontId(), s);
                            });

                            sizeRow.appendChild(lbl);
                            sizeRow.appendChild(btnM);
                            sizeRow.appendChild(valEl);
                            sizeRow.appendChild(btnP);
                            drop.appendChild(sizeRow);

                            var sep = document.createElement("div");
                            sep.className = "font-sep";
                            drop.appendChild(sep);

                            /* Font list */
                            FONTS.forEach(function(font) {
                                var row = document.createElement("div");
                                row.className = "font-item" + (font.id === activeId ? " active" : "");

                                var name = document.createElement("span");
                                name.className = "font-item-name";
                                name.textContent = font.name;

                                var prev = document.createElement("span");
                                prev.className = "font-item-preview";
                                prev.style.fontFamily = font.stack;
                                prev.textContent = font.preview;

                                row.appendChild(name);
                                row.appendChild(prev);
                                row.addEventListener("click", function(){
                                    applyFont(font.id, getActiveFontSize());
                                });
                                drop.appendChild(row);
                            });
                        }

                        renderFontDrop();

                        /* ── Smart positioning font dropdown ── */
                        (function() {
                            var wrap = document.getElementById("bfont-wrap");
                            var drop = document.getElementById("fontdrop");
                            var hideTimer = null;

                            function showDrop() {
                                clearTimeout(hideTimer);
                                drop.classList.add("show");

                                var wRect = wrap.getBoundingClientRect();
                                var dW    = drop.offsetWidth || 200;
                                var dH    = drop.offsetHeight || 300;
                                var gap   = 4;
                                var pad   = 8;

                                /* Vertikal: bawah tombol, naik kalau mepet bawah */
                                var top = wRect.bottom + gap;
                                if (top + dH > window.innerHeight - pad) {
                                    top = wRect.top - dH - gap;
                                }

                                /* Horisontal: center di tombol, clamp ke viewport */
                                var left = wRect.left + (wRect.width / 2) - (dW / 2);
                                left = Math.max(pad, Math.min(left, window.innerWidth - dW - pad));

                                drop.style.top  = top  + "px";
                                drop.style.left = left + "px";
                            }

                            function hideDrop() {
                                hideTimer = setTimeout(function() {
                                    drop.classList.remove("show");
                                }, 120);
                            }

                            wrap.addEventListener("mouseenter", showDrop);
                            wrap.addEventListener("mouseleave", hideDrop);
                            drop.addEventListener("mouseenter", function() { clearTimeout(hideTimer); });
                            drop.addEventListener("mouseleave", hideDrop);
                        })();

                        /* Apply saved font on startup */
                        /* Use setTimeout to ensure CodeMirror is ready */
                        setTimeout(function(){
                            applyFont(getActiveFontId(), getActiveFontSize());
                        }, 100);
                    })();
                })();
            })();
        </script>
    </body>
</html>
