                /* ── Console rendering ── */
                function previewOf(n) {
                    switch (n.t) {
                        case "string": {
                            var s = JSON.stringify(n.v);
                            return s.length > 70 ? s.slice(0, 67) + '..."' : s;
                        }
                        case "number":
                        case "boolean":
                        case "bigint":
                            return String(n.v);
                        case "null":
                            return "null";
                        case "undefined":
                            return "undefined";
                        case "symbol":
                            return n.v;
                        case "function":
                            return "ƒ " + (n.name || "anonymous") + "()";
                        case "array": {
                            var pi = n.items
                                .slice(0, 5)
                                .map(previewOf)
                                .join(", ");
                            return (
                                "Array(" +
                                n.length +
                                ") [" +
                                pi +
                                (n.truncated || n.items.length < n.length
                                    ? ", …"
                                    : "") +
                                "]"
                            );
                        }
                        case "object": {
                            var po = n.entries
                                .slice(0, 4)
                                .map(function (e) {
                                    return e[0] + ": " + previewOf(e[1]);
                                })
                                .join(", ");
                            return (
                                (n.ctor ? n.ctor + " " : "") +
                                "{" +
                                po +
                                (n.entries.length > 4 || n.truncated
                                    ? ", …"
                                    : "") +
                                "}"
                            );
                        }
                        case "map": {
                            var pm = n.entries
                                .slice(0, 3)
                                .map(function (e) {
                                    return (
                                        previewOf(e[0]) +
                                        " => " +
                                        previewOf(e[1])
                                    );
                                })
                                .join(", ");
                            return (
                                "Map(" +
                                n.size +
                                ") {" +
                                pm +
                                (n.size > 3 ? ", …" : "") +
                                "}"
                            );
                        }
                        case "set": {
                            var ps = n.items
                                .slice(0, 3)
                                .map(previewOf)
                                .join(", ");
                            return (
                                "Set(" +
                                n.size +
                                ") {" +
                                ps +
                                (n.size > 3 ? ", …" : "") +
                                "}"
                            );
                        }
                        case "error":
                            return n.name + ": " + n.message;
                        case "date":
                            return n.v;
                        case "regexp":
                            return n.v;
                        case "circular":
                            return "[Circular]";
                        case "more":
                            return "…";
                        default:
                            return String(n.v);
                    }
                }

                function titleOf(args) {
                    var raw = args.map(previewOf).join("  ").trim();
                    var cleaned = raw.replace(/^"(.*)"$/, "$1");
                    var words = cleaned.split(/\s+/).slice(0, 3).join(" ");
                    if (words.length > 38) words = words.slice(0, 38) + "…";
                    return words || "(log)";
                }

                function shortValStr(n, maxChars) {
                    var s;
                    switch (n.t) {
                        case "string":
                            s = n.v;
                            break;
                        case "number":
                        case "boolean":
                        case "bigint":
                            s = String(n.v);
                            break;
                        case "null":
                            s = "null";
                            break;
                        case "undefined":
                            s = "undefined";
                            break;
                        default:
                            s = previewOf(n).replace(/^"(.*)"$/, "$1");
                    }
                    s = String(s);
                    return s.length > maxChars ? s.slice(0, maxChars) + "…" : s;
                }

                function objectPreviewLabel(n) {
                    // Ambil beberapa key:value pertama, dipersingkat
                    if (n.entries && n.entries.length) {
                        var parts = n.entries.slice(0, 2).map(function (e) {
                            return e[0] + ": " + shortValStr(e[1], 10);
                        });
                        var label = parts.join(", ");
                        if (n.entries.length > 2) label += "…";
                        return (n.ctor ? n.ctor + " " : "") + label;
                    }
                    return (n.ctor ? n.ctor + " " : "") + "{}";
                }

                function labelOf(n) {
                    if (n.t === "array") return "Array(" + n.length + ")";
                    if (n.t === "map") return "Map(" + n.size + ")";
                    if (n.t === "set") return "Set(" + n.size + ")";
                    return objectPreviewLabel(n);
                }

                function esc(s) {
                    return String(s).replace(/[&<>"]/g, function (c) {
                        return {
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",

                    });

                        n.t === "object" ||
                        n.t === "array" ||
                        n.t === "map" ||
                        n.t === "set"
                    ) {

                        tg.className = "tt";

                            });
                        else if (n.t === "object") ents = n.entries;
                        else if (n.t === "map")
                            ents = n.entries.map(function (e) {
                                return ["[" + previewOf(e[0]) + "]", e[1]];
                            });

                            (n.name || "anonymous") +

                            n.t === "string"

                                  ? "tnum"
                                  : n.t === "boolean"
                                    ? "tbool"
                                    : n.t === "null"
                                      ? "tnul"
                                      : n.t === "undefined"
                                        ? "tund"
                                        : n.t === "bigint"
                                          ? "tbig"
                                          : n.t === "symbol"
                                            ? "tsym"
                                            : n.t === "date"
                                              ? "tdate"
                                              : n.t === "regexp"
                                                ? "trx"

                        vl.className = cls;
                        vl.textContent =
                            n.t === "string"
                                ? JSON.stringify(n.v)
                                : previewOf(n);
                        w.appendChild(vl);
                    }
                    return w;
                }

                /* ── Konversi warna HEX <-> HSL (untuk slider tema) ── */
                function hexToHsl(hex) {
                    // ! mastiin string valid
                    if (!hex || typeof hex !== "string") return { h: 0, s: 0, l: 53 };
                    hex = hex.replace("#", "");
                    // ! mastiin panjang hex valid (3 atau 6 digit)
                    if (hex.length !== 3 && hex.length !== 6) return { h: 0, s: 0, l: 53 };
                    // ? expand shorthand 3-digit ke 6-digit
                    if (hex.length === 3) {
                        hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2];
                    }
                    var r = parseInt(hex.substr(0, 2), 16) / 255;
                    var g = parseInt(hex.substr(2, 2), 16) / 255;
                    var b = parseInt(hex.substr(4, 2), 16) / 255;
                    var max = Math.max(r, g, b);
                    var min = Math.min(r, g, b);
                    var h = 0;
                    var s = 0;
                    var l = (max + min) / 2;
                    if (max !== min) {
                        var d = max - min;
                        // ? saturasi tergantung lightness > 0.5 atau tidak
                        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                        switch (max) {
                            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                            case g: h = (b - r) / d + 2; break;
                            case b: h = (r - g) / d + 4; break;
                        }
                        h *= 60;
                    }
                    return { h: h, s: s * 100, l: l * 100 };
                }
                function hslToHex(h, s, l) {
                    // ! normalisasi input ke range valid
                    h = ((h % 360) + 360) % 360;
                    s = Math.max(0, Math.min(100, s)) / 100;
                    l = Math.max(0, Math.min(100, l)) / 100;
                    var c = (1 - Math.abs(2 * l - 1)) * s;
                    var x = c * (1 - Math.abs(((h / 60) % 2) - 1));
                    var m = l - c / 2;
                    var r = 0;
                    var g = 0;
                    var b = 0;
                    if (h < 60)       { r = c; g = x; b = 0; }
                    else if (h < 120) { r = x; g = c; b = 0; }
                    else if (h < 180) { r = 0; g = c; b = x; }
                    else if (h < 240) { r = 0; g = x; b = c; }
                    else if (h < 300) { r = x; g = 0; b = c; }
                    else              { r = c; g = 0; b = x; }
                    function toHex(v) {
                        var n = Math.max(0, Math.min(255, Math.round((v + m) * 255)));
                        return n.toString(16).padStart(2, "0");
                    }
                    return "#" + toHex(r) + toHex(g) + toHex(b);
                }

                        cp = document.getElementById("cp"),
                        dv = document.getElementById("dv"),
                        drag = false,
                        MIN = 8,
                        MAX = 92;
                    dv.addEventListener("pointerdown", function (e) {
                        drag = true;
                        dv.classList.add("drag");
                        dv.setPointerCapture(e.pointerId);
                    });
                    dv.addEventListener("pointermove", function (e) {
                        if (!drag) return;
                        var r = pn.getBoundingClientRect(),
                            pct = ((e.clientY - r.top) / r.height) * 100;
                        pct = Math.max(MIN, Math.min(MAX, pct));
                        ep.style.flexBasis = pct + "%";
                        cp.style.flexBasis = 100 - pct + "%";
                        cm.refresh();

                    function end() {

                /* ── File Manager ── */
                (function () {
                    var LS_INDEX = "jspg_files";
                    var LS_ACTIVE = "jspg_active";
                    var LS_ARCHIVE = "jspg_archive";
                    var LSC = function (n) {
                        return "jspg_code:" + n;
                    };

                    /* Init */
                    var files = JSON.parse(
                        localStorage.getItem(LS_INDEX) || "null",
                    );
                    if (!files || !files.length) {
                        files = ["file-1"];
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                    }
                    var active = localStorage.getItem(LS_ACTIVE) || files[0];
                    if (files.indexOf(active) === -1) active = files[0];

                    /* Arsip: [{name, code}] */
                    function loadArchive() {
                        // ! try-catch mastiin parse JSON tidak crash
                        try {
                            return JSON.parse(localStorage.getItem(LS_ARCHIVE) || "[]");
                        } catch (e) {
                            return []; // [] jika data corrupt
                        }
                    }
                    function saveArchive(arr) {
                        localStorage.setItem(LS_ARCHIVE, JSON.stringify(arr));
                    }

                    function saveActive() {
                        localStorage.setItem(LSC(active), cm.getValue());
                        localStorage.setItem(LS_ACTIVE, active);
                    }

                    function switchTo(name) {
                        // ! simpan dulu sebelum pindah
                        saveActive();
                        active = name;
                        localStorage.setItem(LS_ACTIVE, active);
                        var code = localStorage.getItem(LSC(active));
                        // ? kalau file kosong / baru, isi dengan string kosong
                        cm.setValue(code !== null ? code : "");
                        document.getElementById("bfile-label").textContent = active;
                        renderDrop();
                        cm.focus();
                    }

                    function newFile() {
                        saveActive();
                        var idx = 1;
                        while (files.indexOf("file-" + idx) !== -1) idx++;
                        var name = "file-" + idx;
                        files.push(name);
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.setItem(LSC(name), "");
                        switchTo(name);
                    }

                    /* Hapus → arsip, bukan hapus beneran */
                    function archiveFile(name) {
                        // ! jangan arsip kalau file terakhir
                        if (files.length === 1) return;
                        saveActive();
                        var code = localStorage.getItem(LSC(name)) || "";
                        var arc = loadArchive();
                        /* hindari duplikat nama di arsip */
                        var arcName = name;
                        var cnt = 1;
                        while (arc.some(function (a) { return a.name === arcName; })) {
                            arcName = name + "-" + ++cnt;
                        }
                        arc.push({ name: arcName, code: code });
                        saveArchive(arc);
                        files = files.filter(function (f) { return f !== name; });
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.removeItem(LSC(name));
                        // ? kalau file yang diarsip adalah aktif, pindah ke file pertama
                        if (active === name) {
                            switchTo(files[0]);
                        } else {
                            renderDrop();
                        }
                    }

                    /* Kembalikan dari arsip ke daftar file */
                    function restoreFile(arcName) {
                        var arc = loadArchive();
                        var item = null;
                        arc = arc.filter(function (a) {
                            if (a.name === arcName) {
                                item = a;
                                return false;
                            }
                            return true;
                        });
                        // ! kalau item tidak ditemukan di arsip, hentikan
                        if (!item) return;
                        saveArchive(arc);
                        var finalName = arcName;
                        var cnt2 = 1;
                        while (files.indexOf(finalName) !== -1) {
                            finalName = arcName + "-" + ++cnt2;
                        }
                        files.push(finalName);
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.setItem(LSC(finalName), item.code);
                        renderDrop();
                        renderArchivePanel();
                    }

                    /* Hapus permanen dari arsip */
                    function permDeleteFile(arcName) {
                        // ! filter dulu, baru simpan — tidak ada eksekusi sebelum filter
                        var arc = loadArchive().filter(function (a) {
                            return a.name !== arcName;
                        });
                        saveArchive(arc);
                        renderArchivePanel();
                    }

                    function renameFile(oldName, newName) {
                        newName = newName
                            .trim()
                            .replace(/[^a-zA-Z0-9_\-. ]/g, "")
                            .slice(0, 32);
                        // ! mastiin nama valid, beda dari sekarang, dan belum ada duplikat
                        if (!newName || newName === oldName || files.indexOf(newName) !== -1) {
                            return oldName;
                        }
                        var code = localStorage.getItem(LSC(oldName)) || "";
                        files = files.map(function (f) { return f === oldName ? newName : f; });
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.setItem(LSC(newName), code);
                        localStorage.removeItem(LSC(oldName));
                        // ? kalau yang di-rename adalah file aktif, update label
                        if (active === oldName) {
                            active = newName;
                            localStorage.setItem(LS_ACTIVE, active);
                            document.getElementById("bfile-label").textContent = active;
                        }
                        return newName;
                    }

                    function renderDrop() {
                        var drop = document.getElementById("fdrop");
                        drop.innerHTML = "";
                        files.forEach(function (fileName) {
                            (function (name) {
                                var row = document.createElement("div");
                                row.className =
                                    "fdrop-file" +
                                    (name === active ? " active" : "");

                                var ico = document.createElementNS(
                                    "http://www.w3.org/2000/svg",
                                    "svg",
                                );
                                ico.setAttribute("viewBox", "0 0 24 24");
                                ico.setAttribute("fill", "none");
                                ico.setAttribute("stroke", "currentColor");
                                ico.setAttribute("stroke-width", "2");
                                ico.setAttribute("stroke-linecap", "round");
                                ico.setAttribute("stroke-linejoin", "round");
                                ico.innerHTML =
                                    '<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/>';

                                var lbl = document.createElement("span");
                                lbl.className = "fdrop-name";
                                lbl.textContent = name;

                                function startRename() {
                                    lbl.contentEditable = "true";
                                    lbl.focus();
                                    var rng = document.createRange();
                                    rng.selectNodeContents(lbl);
                                    window.getSelection().removeAllRanges();
                                    window.getSelection().addRange(rng);
                                }

                                lbl.addEventListener("dblclick", function (e) {
                                    e.stopPropagation();
                                    startRename();
                                });
                                lbl.addEventListener("keydown", function (e) {
                                    if (e.key === "Enter") {
                                        e.preventDefault();
                                        lbl.blur();
                                    }
                                    if (e.key === "Escape") {
                                        lbl.textContent = name;
                                        lbl.blur();
                                    }
                                });
                                lbl.addEventListener("blur", function () {
                                    lbl.contentEditable = "false";
                                    renameFile(name, lbl.textContent);
                                    renderDrop();
                                });

                                var ren = document.createElement("span");
                                ren.className = "fdrop-action fdrop-ren";
                                ren.title = "Rename";
                                ren.innerHTML =
                                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
                                ren.addEventListener("click", function (e) {
                                    e.stopPropagation();
                                    startRename();
                                });

                                /* 1 klik → arsip (bukan hapus beneran) */
                                var del = document.createElement("span");
                                del.className = "fdrop-action fdrop-del";
                                wireArchiveBtn(del, {
                                    title:
                                        files.length === 1
                                            ? "Tidak bisa hapus file terakhir"
                                            : "Pindah ke arsip",
                                    onArchive: function () {
                                        if (files.length > 1) archiveFile(name);
                                    },
                                });

                                row.appendChild(ico);
                                row.appendChild(lbl);
                                row.appendChild(ren);
                                row.appendChild(del);
                                row.addEventListener("click", function () {
                                    if (name !== active) switchTo(name);
                                });
                                drop.appendChild(row);
                            })(fileName);
                        });

                        var sep = document.createElement("div");
                        sep.className = "fdrop-sep";
                        drop.appendChild(sep);

                        var btnNew = document.createElement("div");
                        btnNew.className = "fdrop-new";
                        btnNew.innerHTML =
                            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> File baru';
                        btnNew.addEventListener("click", newFile);
                        drop.appendChild(btnNew);
                    }

                    /* ── Panel Arsip ── */
                    function renderArchivePanel() {
                        var list = document.getElementById("arc-list");
                        list.innerHTML = "";
                        var arc = loadArchive();
                        document.getElementById("arc-head-title").textContent =
                            "Arsip File (" + arc.length + ")";

                            emp.className = "arc-empty";

                    function loadCustomThemes() {

                        if (theme.id !== "ocean") {

                        /* Inject warna seleksi dinamis */

                    /* Helper hex → {r,g,b} */
                    function hexToRgb(hex) {
                        // ! mastiin string valid dulu
                        if (!hex || typeof hex !== "string") return null;
                        hex = hex.replace(/^#/, "");
                        // ? expand shorthand 3-digit ke 6-digit
                        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                        var n = parseInt(hex, 16);
                        // ! mastiin hasil parseInt valid
                        if (isNaN(n)) return null;
                        return {
                            r: (n >> 16) & 255,
                            g: (n >> 8) & 255,
                            b: n & 255,
                        };
                    }

                    var LS_THEME_ARC = "jspg_theme_archive";
                    function loadThemeArchive() {
                        // ! try-catch mastiin parse JSON tidak crash
                        try {
                            return JSON.parse(localStorage.getItem(LS_THEME_ARC) || "[]");
                        } catch (e) {
                            return []; // [] jika data corrupt
                        }
                    }
                    function saveThemeArchive(arr) {
                        localStorage.setItem(LS_THEME_ARC, JSON.stringify(arr));
                    }

                    function archiveTheme(id) {
                        var custom = loadCustomThemes();
                        var found = null;
                        custom = custom.filter(function (t) {
                            if (t.id === id) {
                                found = t;
                                return false;
                            }
                            return true;
                        });
                        // ! kalau id tidak ditemukan, hentikan
                        if (!found) return;
                        saveCustomThemes(custom);
                        var arc = loadThemeArchive();
                        arc.push(found);
                        saveThemeArchive(arc);
                        // ? kalau tema aktif yang diarsip, fallback ke ocean
                        if (getActiveThemeId() === id) applyTheme(BUILTIN_THEMES.ocean);
                        renderThemeDrop();
                    }

                    function restoreTheme(id) {
                        var arc = loadThemeArchive();
                        var found = null;
                        arc = arc.filter(function (t) {
                            if (t.id === id) {
                                found = t;
                                return false;
                            }
                            return true;
                        });
                        // ! kalau tema tidak ada di arsip, hentikan
                        if (!found) return;
                        saveThemeArchive(arc);
                        var custom = loadCustomThemes();
                        custom.push(found);
                        saveCustomThemes(custom);
                        renderThemeDrop();
                        renderThemeArchivePanel();
                    }

                    function permDeleteTheme(id) {
                        // ! filter dulu, baru simpan
                        var arc = loadThemeArchive().filter(function (t) {
                            return t.id !== id;
                        });
                        saveThemeArchive(arc);
                        renderThemeArchivePanel();
                        renderThemeDrop(); // ! sync angka di dropdown tema setelah hapus

                    /* ── Editor tema (panel sliding) ── */
                    var editorColors = {},
                        editorHSL = {},
                        editingThemeId = null;

                    function openThemeEditor(theme) {
                        var base = theme
                            ? theme.colors
                            : resolveTheme(getActiveThemeId()).colors;
                        editorColors = {};
                        editorHSL = {};
                        THEME_VAR_KEYS.forEach(function (k) {
                            var hex = (base[k] || "#888888").toLowerCase();
                            editorColors[k] = hex;
                            editorHSL[k] = hexToHsl(hex);
                        });
                        editingThemeId = theme ? theme.id : null;
                        document.getElementById("thed-name").textContent = theme
                            ? theme.name
                            : "Tema Baru " + (loadCustomThemes().length + 1);

                        applyEditorColorsLive();
                        /* Reset posisi & ukuran popup ke default setiap kali dibuka */
                        var thed = document.getElementById("thed");

                        thed.style.top       = "";
                        thed.style.width     = "";
                        thed.style.height    = "";
                        thed.style.maxWidth  = "";
                        thed.style.maxHeight = "";
                        thed.style.margin    = "";
                        thed.style.position  = "";

                            .getElementById("thed-overlay")
                            .classList.add("show");
                    }

                    function closeThemeEditor(revert) {
                        document
                            .getElementById("thed-overlay")
                            .classList.remove("show");
                        /* Tutup & reset panel paste massal */
                        var pp = document.getElementById("thed-paste-panel");
