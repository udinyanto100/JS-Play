<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1"
        />
        <title>JS Playground</title>
        <link rel="icon" type="image/png" href="https://img.icons8.com/nolan/64/forward.png" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/gruvbox-dark.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css"
        />
        <style>
            :root {
                --b0: #0e1520;
                --b0s: #121c2e;
                --b1: #1a2540;
                --b2: #253050;
                --b3: #334068;
                --b4: #4d6080;
                --f1: #8a9ab0;  /* dinaikkan dari #656f7d — teks utama lebih jelas */
                --f2: #b8d0e8;  /* dinaikkan dari #9bbad8 */
                --f3: #90aac8;  /* dinaikkan dari #7090b0 */
                --f4: #6080a0;  /* dinaikkan dari #4d6880 */
                /* ── Ocean: ungu-teal-rose susu, kontras cukup ── */
                --red:   #d09098;  /* dusty rose, lebih terang */
                --green: #72b89e;  /* sage teal */
                --yel:   #a898d8;  /* soft indigo */
                --blu:   #82b0cc;  /* slate blue */
                --pur:   #a090c8;  /* dusty violet */
                --aqu:   #72aab8;  /* muted teal */
                --ora:   #c090a8;  /* dusty mauve */
                --gry:   #607090;
                --acc: var(--blu);
                --rad: 6px;
            }
            /* ── Tema Ocean (default): ungu-teal-rose susu ── */

            /* ── Tema Ember: rose-mauve-berry susu, hangat tanpa kuning/oranye ── */
            body.theme-ember {
                --red:   #d89098;  /* dusty crimson */
                --green: #90b098;  /* sage muted */
                --yel:   #c088b8;  /* berry mauve */
                --blu:   #b090c8;  /* dusty lavender */
                --pur:   #c880b0;  /* dusty fuchsia */
                --aqu:   #80a0b0;  /* slate teal */
                --ora:   #d890a0;  /* rose */
                --gry:   #707080;
                --acc: var(--pur);
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family:
                    ui-monospace, "SF Mono", "Fira Code", "Cascadia Code",
                    Consolas, monospace;
                background: var(--b0);
                color: var(--f1);
                height: 100dvh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                -webkit-tap-highlight-color: transparent;
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100%;
                min-height: 0;
            }

            /* ── File Manager ── */
            #bfile-wrap {
                position: relative;
                display: flex;
                align-items: center;
            }
            #bfile {
                display: flex;
                align-items: center;
                gap: 4px;
                height: 26px;
                padding: 0 7px;
                flex-shrink: 0;
                border-radius: var(--rad);
                border: 1px solid var(--b2);
                background: var(--b1);
                color: var(--f2);
                cursor: pointer;
                font-family: inherit;
                font-size: 11.5px;
                white-space: nowrap;
                max-width: 120px;
                overflow: hidden;
                text-overflow: ellipsis;
                transition: background 0.12s, color 0.12s, border-color 0.12s;
            }
            #bfile:hover, #bfile-wrap:hover #bfile {
                background: var(--b2);
                color: var(--f1);
                border-color: var(--b3);
            }
            #bfile svg {
                width: 12px;
                height: 12px;
                flex-shrink: 0;
                opacity: 0.7;
            }
            #fdrop {
                display: none;
                position: absolute;
                top: 100%;          /* nempel langsung, tanpa gap */
                left: 0;
                min-width: 180px;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: var(--rad);
                box-shadow: 0 8px 24px rgba(0,0,0,0.5);
                z-index: 100;
                padding: 4px;
                flex-direction: column;
                gap: 2px;
                /* jembatan hover: pseudo-element di atas supaya mouse tidak "keluar" */
            }
            /* jembatan invisible di antara tombol dan dropdown */
            #bfile-wrap::after {
                content: "";
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                height: 8px;        /* area jembatan */
                background: transparent;
            }
            #bfile-wrap:hover #fdrop,
            #fdrop:hover {
                display: flex;
            }
            .fdrop-file {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                color: var(--f2);
                transition: background 0.1s, color 0.1s;
                user-select: none;
            }
            .fdrop-file:hover {
                background: var(--b2);
                color: var(--f1);
            }
            .fdrop-file.active {
                background: var(--b2);
                color: var(--acc);
            }
            .fdrop-file svg {
                width: 12px;
                height: 12px;
                flex-shrink: 0;
                opacity: 0.6;
            }
            .fdrop-name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .fdrop-name[contenteditable="true"] {
                outline: none;
                background: var(--b1);
                border-radius: 3px;
                padding: 0 3px;
                color: var(--f1);
            }
            .fdrop-action {
                opacity: 0;
                padding: 2px;
                border-radius: 3px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: opacity 0.1s, color 0.1s, background 0.1s;
                flex-shrink: 0;
                cursor: pointer;
            }
            .fdrop-file:hover .fdrop-action {
                opacity: 0.5;
            }
            .fdrop-action:hover {
                opacity: 1 !important;
                background: var(--b3);
            }
            .fdrop-ren {
                color: var(--aqu);
            }
            .fdrop-del {
                color: var(--red);
            }
            .fdrop-del.armed {
                color: var(--green) !important;
                opacity: 1 !important;
                background: rgba(114, 184, 158, 0.16);
            }
            @keyframes fdropPop {
                0% {
                    transform: scale(0.4) rotate(-120deg);
                    opacity: 0;
                }
                55% {
                    transform: scale(1.35) rotate(10deg);
                    opacity: 1;
                }
                80% {
                    transform: scale(0.92) rotate(-4deg);
                }
                100% {
                    transform: scale(1) rotate(0deg);
                }
            }
            .fdrop-action.pop svg {
                animation: fdropPop 0.32s cubic-bezier(.34,1.56,.64,1);
            }
            .fdrop-sep {
                height: 1px;
                background: var(--b2);
                margin: 3px 0;
            }
            .fdrop-new {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                color: var(--aqu);
                transition: background 0.1s;
            }
            .fdrop-new:hover {
                background: var(--b2);
            }
            .fdrop-new svg {
                width: 12px;
                height: 12px;
            }

            /* ── Archive panel (file & tema) ── */
            #arc-overlay {
                position: fixed;
                inset: 0;
                background: rgba(5,8,14,0.55);
                z-index: 150;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.15s ease;
                padding: 14px;
            }
            #arc-overlay.show { opacity: 1; pointer-events: auto; }
            #arc-panel {
                width: 100%;
                max-width: 360px;
                max-height: 70vh;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                box-shadow: 0 12px 40px rgba(0,0,0,0.55);
                transform: translateY(12px) scale(0.98);
                transition: transform 0.15s ease;
            }
            #arc-overlay.show #arc-panel { transform: translateY(0) scale(1); }
            #arc-head {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                border-bottom: 1px solid var(--b1);
                flex-shrink: 0;
            }
            #arc-head svg { width: 14px; height: 14px; color: var(--f4); }
            #arc-head-title { flex: 1; font-size: 13px; font-weight: 600; color: var(--f2); }
            #arc-close {
                width: 24px; height: 24px;
                display: flex; align-items: center; justify-content: center;
                border-radius: 4px; border: none; background: transparent;
                color: var(--f3); cursor: pointer; font-family: inherit;
                transition: background 0.1s, color 0.1s;
            }
            #arc-close:hover { background: var(--b1); color: var(--f1); }
            #arc-list {
                flex: 1; overflow-y: auto; padding: 6px;
                display: flex; flex-direction: column; gap: 2px;
            }
            .arc-empty { text-align: center; color: var(--f4); font-size: 12px; padding: 20px 0; }
            .arc-item {
                display: flex; align-items: center; gap: 8px;
                padding: 6px 8px; border-radius: 5px; background: var(--b1);
            }
            .arc-item-name {
                flex: 1; font-size: 12px; color: var(--f2);
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            }
            .arc-restore {
                display: flex; align-items: center; gap: 4px;
                padding: 3px 8px; border-radius: 4px; border: 1px solid var(--b3);
                background: transparent; color: var(--green);
                font-family: inherit; font-size: 11px; cursor: pointer;
                transition: background 0.1s; white-space: nowrap;
            }
            .arc-restore:hover { background: var(--b2); }
            .arc-restore svg { width: 10px; height: 10px; }
            .arc-perm {
                display: flex; align-items: center; justify-content: center;
                width: 22px; height: 22px; border-radius: 4px; border: none;
                background: transparent; color: var(--red); cursor: pointer;
                transition: background 0.1s; flex-shrink: 0;
            }
            .arc-perm:hover { background: rgba(208,144,152,0.15); }
            .arc-perm svg { width: 11px; height: 11px; }

            /* ── Theme switcher dropdown (reuses .fdrop-* styles) ── */
            #bthm-wrap {
                position: relative;
                display: flex;
                align-items: center;
            }
            #bthm-wrap::after {
                content: "";
                position: absolute;
                top: 100%;
                right: 0;
                width: 100%;
                height: 8px;
                background: transparent;
            }
            #thdrop {
                display: none;
                position: absolute;
                top: 100%;
                right: 0;
                min-width: 215px;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: var(--rad);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                z-index: 100;
                padding: 4px;
                flex-direction: column;
                gap: 2px;
            }
            #bthm-wrap:hover #thdrop,
            #thdrop:hover {
                display: flex;
            }
            .thswatches {
                display: flex;
                gap: 2px;
                flex-shrink: 0;
            }
            .thdot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.08);
            }

            /* ── Theme editor overlay ── */
            #thed-overlay {
                position: fixed;
                inset: 0;
                background: rgba(5, 8, 14, 0.6);
                z-index: 200;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.18s ease;
                padding: 14px;
            }
            #thed-overlay.show {
                opacity: 1;
                pointer-events: auto;
            }
            #thed {
                width: 100%;
                max-width: 420px;
                max-height: 86vh;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                transform: translateY(14px) scale(0.98);
                transition: transform 0.18s ease;
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
            }
            #thed-overlay.show #thed {
                transform: translateY(0) scale(1);
            }
            #thed-copy {
                width: 26px;
                height: 26px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 5px;
                border: 1px solid var(--b2);
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                transition: background 0.1s, color 0.1s, border-color 0.1s;
            }
            #thed-copy:hover { background: var(--b1); color: var(--f1); border-color: var(--b3); }
            #thed-copy.copied { color: var(--green); border-color: var(--green); background: rgba(114,184,158,0.12); }
            #thed-copy svg { pointer-events: none; }

            /* Toast notifikasi copy */
            #copy-toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(12px);
                background: var(--b2);
                border: 1px solid var(--b3);
                color: var(--f1);
                font-size: 12px;
                padding: 7px 14px;
                border-radius: 20px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.4);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.15s ease, transform 0.15s ease;
                z-index: 300;
                white-space: nowrap;
            }
            #copy-toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            #thed-head {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                border-bottom: 1px solid var(--b1);
                flex-shrink: 0;
            }
            #thed-head svg {
                width: 14px;
                height: 14px;
                color: var(--f4);
                flex-shrink: 0;
            }
            #thed-name {
                font-size: 13px;
                color: var(--f2);
                font-weight: 600;
                outline: none;
                border-radius: 4px;
                padding: 2px 5px;
                min-width: 40px;
                flex: 1;
            }
            #thed-name[contenteditable="true"]:focus {
                background: var(--b1);
            }
            #thed-body {
                flex: 1;
                overflow-y: auto;
                padding: 4px 6px 10px;
            }
            .thgroup-h {
                font-size: 10.5px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--f4);
                padding: 10px 8px 4px;
            }
            .throw {
                border-radius: 6px;
                overflow: hidden;
            }
            .throw-h {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 8px;
                cursor: pointer;
                border-radius: 6px;
                transition: background 0.1s;
                user-select: none;
            }
            .throw-h:hover {
                background: var(--b1);
            }
            .throw.expanded > .throw-h {
                background: var(--b1);
            }
            .thsw {
                width: 18px;
                height: 18px;
                border-radius: 5px;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.15);
                transition: background 0.05s linear;
            }
            .thlabel {
                flex: 1;
                font-size: 12.5px;
                color: var(--f2);
            }
            .thhex {
                font-size: 11px;
                color: var(--f4);
                font-variant-numeric: tabular-nums;
            }
            .thok {
                color: var(--green);
                flex-shrink: 0;
                display: flex;
            }
            .thok svg {
                width: 12px;
                height: 12px;
            }
            .thpicker {
                display: none;
                flex-direction: column;
                gap: 0;
                padding: 0 10px 12px 10px;
            }
            .throw.expanded .thpicker {
                display: flex;
            }

            /* ── Color Picker (HSV canvas + hue slider + hex input) ── */
            .cpk-wrap {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 8px 0 4px;
            }
            .cpk-canvas-wrap {
                position: relative;
                width: 100%;
                height: 140px;
                border-radius: 5px;
                overflow: hidden;
                cursor: crosshair;
                flex-shrink: 0;
            }
            .cpk-canvas {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                display: block;
            }
            .cpk-thumb {
                position: absolute;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                border: 2px solid #fff;
                box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.5);
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            .cpk-hue-wrap {
                position: relative;
                height: 14px;
                border-radius: 7px;
                background: linear-gradient(to right,
                    #f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);
                cursor: pointer;
                overflow: visible;
            }
            .cpk-hue-thumb {
                position: absolute;
                top: 50%;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #fff;
                border: 2px solid #fff;
                box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.5);
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            .cpk-hex-row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .cpk-swatch {
                width: 22px;
                height: 22px;
                border-radius: 5px;
                flex-shrink: 0;
                border: 1px solid rgba(255,255,255,0.12);
            }
            .cpk-hex-input {
                flex: 1;
                background: var(--b1);
                border: 1px solid var(--b3);
                border-radius: 5px;
                color: var(--f2);
                font-family: inherit;
                font-size: 12px;
                padding: 4px 8px;
                outline: none;
                letter-spacing: 0.05em;
            }
            .cpk-hex-input:focus {
                border-color: var(--acc);
            }
            .thconfirm {
                align-self: flex-start;
                display: flex;
                align-items: center;
                gap: 5px;
                margin-top: 2px;
                padding: 5px 10px;
                border-radius: var(--rad);
                border: 1px solid var(--b3);
                background: var(--b1);
                color: var(--green);
                font-family: inherit;
                font-size: 11.5px;
                cursor: pointer;
                transition: background 0.12s;
            }
            .thconfirm:hover {
                background: var(--b2);
            }
            .thconfirm svg {
                width: 11px;
                height: 11px;
            }
            #thed-foot {
                display: flex;
                gap: 8px;
                padding: 10px 12px;
                border-top: 1px solid var(--b1);
                flex-shrink: 0;
            }
            #thed-save {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                height: 32px;
                border-radius: var(--rad);
                border: 1px solid var(--b3);
                background: var(--b1);
                color: var(--green);
                font-family: inherit;
                font-size: 12.5px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.12s;
            }
            #thed-save:hover {
                background: var(--b2);
            }
            #thed-save svg {
                width: 14px;
                height: 14px;
            }
            #thed-cancel {
                width: 32px;
                height: 32px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: var(--rad);
                border: 1px solid var(--b2);
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                transition: background 0.12s, color 0.12s;
            }
            #thed-cancel:hover {
                background: var(--b1);
                color: var(--f1);
            }
            #thed-cancel svg {
                width: 14px;
                height: 14px;
            }

            /* ── Toolbar ── */
            #tb {
                display: flex;
                align-items: center;
                gap: 3px;
                padding: 6px 8px;
                background: var(--b0s);
                border-bottom: 1px solid var(--b2);
                flex-wrap: wrap;
                flex-shrink: 0;
            }
            .sp {
                flex: 1 1 auto;
                min-width: 4px;
            }
            .sep {
                width: 1px;
                height: 18px;
                background: var(--b2);
                margin: 0 3px;
                flex-shrink: 0;
            }
            .btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 26px;
                height: 26px;
                flex-shrink: 0;
                border-radius: var(--rad);
                border: 1px solid transparent;
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                transition:
                    background 0.12s,
                    color 0.12s,
                    border-color 0.12s;
            }
            .btn svg {
                width: 15px;
                height: 15px;
                pointer-events: none;
            }
            .btn:hover {
                background: var(--b1);
                color: var(--f1);
            }
            .btn:active {
                transform: translateY(1px);
            }
            .btn.on {
                background: var(--b2);
                color: var(--acc);
                border-color: var(--b3);
            }
            .btn.run {
                color: var(--green);
            }
            .btn.run:hover {
                background: var(--b1);
                color: var(--green);
            }

            /* ── Panels ── */
            #panels {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            #ep {
                flex: 0 0 60%;
                min-height: 0;
                overflow: hidden;
            }
            #ed {
                height: 100%;
            }
            #dv {
                flex: 0 0 6px;
                background: var(--b1);
                cursor: row-resize;
                position: relative;
                touch-action: none;

                    wordWrap: false,
                };
                var arTimer = null,
                    wdTimer = null,
                    lastRun = 0;

                var STARTER = [
                    "// JS Playground — Dark Blue Edition",
                    "// Tekan ▶ atau Ctrl+Enter untuk eksekusi",
                    "",
                    "const state = {",
                    '  user: { name: "Fajar", level: 2 },',
                    '  inventory: ["sword", "shield", "potion"],',
                    "};",
                    "",
                    'console.log("State awal:", state);',
                    "",
                    "const nextState = {",
                    "  ...state,",
                    "  user: { ...state.user, level: state.user.level + 1 },",
                    "};",
                    "",
                    'console.log("State setelah update:", nextState);',
                    'console.log("Immutability check:", state.user.level !== nextState.user.level);',
                    "",
                    "for (let i = 1; i <= 3; i++) {",
                    '  console.log("Loop ke-" + i, i * i);',
                    "}",
                ].join("\n");

                /* ── Autocomplete ── */
                function ownNames(obj) {
                    try {
                        return Object.getOwnPropertyNames(obj).filter(
                            function (n) {
                                return (
                                    !/^\d+$/.test(n) &&
                                    n !== "caller" &&
                                    n !== "arguments" &&
                                    n.indexOf("__") !== 0
                                );
                            },
                        );
                    } catch (e) {
                        return [];
                    }
                }
                var MD = {
                    Array: ownNames(Array).concat(ownNames(Array.prototype)),
                    String: ownNames(String).concat(ownNames(String.prototype)),
                    Object: ownNames(Object).concat(ownNames(Object.prototype)),
                    Number: ownNames(Number).concat(ownNames(Number.prototype)),
                    Boolean: ownNames(Boolean.prototype),
                    Math: ownNames(Math),
                    JSON: ownNames(JSON),
                    console: ownNames(console),
                    Promise: ownNames(Promise).concat(
                        ownNames(Promise.prototype),
                    ),
                    Map: ownNames(Map.prototype),
                    Set: ownNames(Set.prototype),
                    Date: ownNames(Date).concat(ownNames(Date.prototype)),
                    RegExp: ownNames(RegExp.prototype),
                    Function: ownNames(Function.prototype),
                    Symbol: ownNames(Symbol),
                    Error: ownNames(Error.prototype),
                };
                var GM = (function () {
                    var s = {},
                        o = [];
                    []
                        .concat(
                            ownNames(Array.prototype),
                            ownNames(Object.prototype),
                            ownNames(String.prototype),
                            ownNames(Number.prototype),
                            ownNames(Function.prototype),
                        )
                        .forEach(function (n) {
                            if (!s[n]) {
                                s[n] = 1;
                                o.push(n);
                            }
                        });
                    return o;
                })();
                var GN = [
                    "Array",
                    "Object",
                    "String",
                    "Number",
                    "Boolean",
                    "Math",
                    "JSON",
                    "console",
                    "Promise",
                    "Map",
                    "Set",
                    "WeakMap",
                    "WeakSet",
                    "Date",
                    "RegExp",
                    "Symbol",
                    "Error",
                    "TypeError",
                    "RangeError",
                    "SyntaxError",
                    "parseInt",
                    "parseFloat",
                    "isNaN",
                    "isFinite",
                    "NaN",
                    "Infinity",
                    "undefined",
                    "globalThis",
                    "Function",
                    "structuredClone",
                ];
                var KW = [
                    "break",
                    "case",
                    "catch",
                    "class",
                    "const",
                    "continue",
                    "debugger",
                    "default",
                    "delete",
                    "do",
                    "else",
                    "export",
                    "extends",
                    "finally",
                    "for",
                    "function",
                    "if",
                    "import",
                    "in",
                    "instanceof",
                    "let",
                    "new",
                    "return",
                    "super",
                    "switch",
                    "this",
                    "throw",
                    "try",
                    "typeof",
                    "var",
                    "void",
                    "while",
                    "with",
                    "yield",
                    "async",
                    "await",
                    "of",
                    "static",
                    "get",
                    "set",
                    "true",
                    "false",
                    "null",
                ];

                function scanIds(cm) {
                    var t = cm.getValue(),
                        ids = {},
                        re =
                            /\b(?:const|let|var|function\*?|class)\s+([A-Za-z_$][\w$]*)/g,
                        m;
                    while ((m = re.exec(t))) ids[m[1]] = 1;
                    var ra = /\(([^()]*)\)\s*=>/g;
                    while ((m = ra.exec(t))) {
                        m[1].split(",").forEach(function (p) {
                            var n = p
                                .trim()
                                .split(/[=:]/)[0]
                                .trim()
                                .replace(/[{}\[\].]/g, "");
                            if (/^[A-Za-z_$][\w$]*$/.test(n)) ids[n] = 1;
                        });
                    }
                    return Object.keys(ids);
                }
                function getTok(cm, cur) {
                    var line = cm.getLine(cur.line),
                        s = cur.ch,
                        e = cur.ch;
                    while (s > 0 && /[\w$]/.test(line.charAt(s - 1))) s--;
                    while (e < line.length && /[\w$]/.test(line.charAt(e))) e++;
                    var w = line.slice(s, e),
                        dot = false,
                        base = "";
                    if (s > 0 && line.charAt(s - 1) === ".") {
                        dot = true;
                        var be = s - 1,
                            bs = be;
                        while (bs > 0 && /[\w$]/.test(line.charAt(bs - 1)))
                            bs--;
                        base = line.slice(bs, be);
                    }
                    return {
                        start: s,
                        end: e,
                        word: w,
                        dotBefore: dot,
                        base: base,
                        line: cur.line,
                    };
                }
                function customHint(cm) {
                    var cur = cm.getCursor(),
                        tok = getTok(cm, cur),
                        list = [];
                    if (tok.dotBefore) {
                        var d = MD[tok.base] || GM;
                        list = d.filter(function (w) {
                            return (
                                w
                                    .toLowerCase()
                                    .indexOf(tok.word.toLowerCase()) === 0
                            );
                        });
                    } else {
                        var sc = scanIds(cm),
                            all = KW.concat(GN, sc),
                            seen = {};
                        list = all.filter(function (w) {
                            if (seen[w]) return false;
                            seen[w] = 1;
                            return (
                                w
                                    .toLowerCase()
                                    .indexOf(tok.word.toLowerCase()) === 0 &&
                                w.toLowerCase() !== tok.word.toLowerCase()
                            );
                        });
                    }
                    if (!list.length) return null;
                    list.sort();
                    return {
                        list: list.map(function (w) {
                            return { text: w, displayText: w };
                        }),
                        from: CodeMirror.Pos(tok.line, tok.start),
                        to: CodeMirror.Pos(tok.line, tok.end),
                    };
                }

                /* ── CodeMirror init ── */
                var cm = CodeMirror(document.getElementById("ed"), {
                    value: STARTER,
                    mode: "javascript",
                    theme: "gruvbox-dark",
                    lineNumbers: true,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    foldGutter: true,
                    styleActiveLine: true,
                    gutters: [
                        "CodeMirror-linenumbers",
                        "CodeMirror-foldgutter",
                    ],
                    indentUnit: 2,
                    tabSize: 2,
                    extraKeys: {
                        "Ctrl-Enter": function () {
                            runCode();
                        },
                        "Cmd-Enter": function () {
                            runCode();
                        },
                        "Ctrl-Space": "autocomplete",
                        "Alt-Space": "autocomplete",
                        Tab: function (c) {
                            if (c.somethingSelected()) c.indentSelection("add");
                            else c.replaceSelection("  ");
                        },
                    },
                    hintOptions: { hint: customHint, completeSingle: false },
                });
                cm.on("inputRead", function (c, ch) {
                    if (
                        ch.origin === "+input" &&
                        ch.text[0] &&
                        /[\w.]/.test(ch.text[0])
                    )
                        CodeMirror.commands.autocomplete(c, null, {
                            completeSingle: false,
                        });
                });
                var lastCode = cm.getValue().replace(/\s+/g, "");
                cm.on("change", function () {
                    clearTimeout(wdTimer);
                    wdTimer = setTimeout(function () {
                        localStorage.setItem("jspg_code", cm.getValue());
                    }, 500);
                    if (state.autoRun) {
                        var stripped = cm.getValue().replace(/\s+/g, "");
                        if (stripped === lastCode) return;
                        lastCode = stripped;
                        clearTimeout(arTimer);
                        arTimer = setTimeout(runCode, 700);
                    }
                });

                /* ── Sandbox ── */
                function buildHTML(code) {
                    var cj = JSON.stringify(code);
                    return (
                        "<!DOCTYPE html><html><head></head><body><script>\n" +
                        "(function(){\n" +
                        "function serialize(v,d,s){\n" +
                        "  s=s||new Set();d=d||0;\n" +
                        '  if(v===null)return{t:"null"};\n' +
                        '  if(v===undefined)return{t:"undefined"};\n' +
                        "  var tp=typeof v;\n" +
                        '  if(tp==="number"){if(Number.isNaN(v))return{t:"number",v:"NaN"};if(Object.is(v,-0))return{t:"number",v:"-0"};return{t:"number",v:String(v)};}\n' +
                        '  if(tp==="string")return{t:"string",v:v};\n' +
                        '  if(tp==="boolean")return{t:"boolean",v:v};\n' +
                        '  if(tp==="bigint")return{t:"bigint",v:v.toString()};\n' +
                        '  if(tp==="symbol")return{t:"symbol",v:v.toString()};\n' +
                        '  if(tp==="function"){var src="";try{src=Function.prototype.toString.call(v);}catch(e){}return{t:"function",name:v.name||"anonymous",src:src.slice(0,300)};}\n' +
                        '  if(typeof v==="object"){\n' +
                        '    if(s.has(v))return{t:"circular"};\n' +
                        '    if(d>6)return{t:"more"};\n' +
                        '    if(Array.isArray(v)){s.add(v);var it=[];var mx=Math.min(v.length,100);for(var i=0;i<mx;i++)it.push(serialize(v[i],d+1,s));return{t:"array",items:it,length:v.length,truncated:v.length>mx};}\n' +
                        '    if(v instanceof Error)return{t:"error",name:v.name,message:v.message,stack:(v.stack||"").split("\\n").slice(0,8).join("\\n")};\n' +
                        '    if(v instanceof Date)return{t:"date",v:v.toISOString()};\n' +
                        '    if(v instanceof RegExp)return{t:"regexp",v:v.toString()};\n' +
                        '    if(v instanceof Map){s.add(v);var en=[];var c=0;v.forEach(function(vv,k){if(c++<50)en.push([serialize(k,d+1,s),serialize(vv,d+1,s)]);});return{t:"map",entries:en,size:v.size};}\n' +
                        '    if(v instanceof Set){s.add(v);var si=[];var c2=0;v.forEach(function(vv){if(c2++<50)si.push(serialize(vv,d+1,s));});return{t:"set",items:si,size:v.size};}\n' +
                        '    s.add(v);var ct="";try{ct=(v.constructor&&v.constructor.name!=="Object")?v.constructor.name:"";}catch(e){}\n' +
                        "    var ks=Object.keys(v),et=[],mk=Math.min(ks.length,100);\n" +
                        '    for(var j=0;j<mk;j++){var k=ks[j];try{et.push([k,serialize(v[k],d+1,s)]);}catch(e){et.push([k,{t:"string",v:"[unreadable]"}]);}}\n' +
                        '    return{t:"object",entries:et,ctor:ct,truncated:ks.length>mk};\n' +
                        "  }\n" +
                        '  return{t:"string",v:String(v)};\n' +
                        "}\n" +
                        'function send(tp,pl){parent.postMessage({type:tp,payload:pl},"*");}\n' +
                        '["log","info","warn","error","debug"].forEach(function(lv){\n' +
                        '  console[lv]=function(){var a=Array.prototype.slice.call(arguments).map(function(x){return serialize(x);});send("console",{level:lv==="debug"?"log":lv,args:a,time:Date.now()});};\n' +
                        "});\n" +
                        'window.addEventListener("error",function(e){send("console",{level:"error",args:[serialize(e.error||e.message)],time:Date.now()});e.preventDefault();});\n' +
                        'window.addEventListener("unhandledrejection",function(e){send("console",{level:"error",args:[serialize(e.reason)],time:Date.now()});e.preventDefault();});\n' +
                        "var __t=performance.now(),__fn;\n" +
                        'try{__fn=new Function("return (async function(){\\n"+' +
                        cj +
                        '+"\\n})();");}\n' +
                        'catch(e){send("console",{level:"error",args:[serialize(e)],time:Date.now()});send("done",{duration:performance.now()-__t,time:Date.now()});__fn=null;}\n' +
                        'if(__fn){__fn().then(function(){send("done",{duration:performance.now()-__t,time:Date.now()});}).catch(function(e){send("console",{level:"error",args:[serialize(e)],time:Date.now()});send("done",{duration:performance.now()-__t,time:Date.now()});});}\n' +
                        "})();\n" +
                        "<\/script></body></html>"
                    );
                }

                function runCode() {
                    clearConsole();
                    var code = cm.getValue(),
                        html = buildHTML(code);
                    var old = document.getElementById("sb"),
                        fresh = document.createElement("iframe");
                    fresh.id = "sb";
                    fresh.style.display = "none";
                    fresh.setAttribute("sandbox", "allow-scripts");
                    old.replaceWith(fresh);
                    lastRun = Date.now();
                    fresh.srcdoc = html;
                    clearTimeout(wdTimer);
                    wdTimer = setTimeout(function () {
                        addLog({
                            level: "error",
                            args: [
                                {
                                    t: "string",
                                    v: "⏱ Eksekusi dihentikan — kemungkinan infinite loop.",
                                },
                            ],
                            time: Date.now(),
                        });
                        var k = document.createElement("iframe");
                        k.id = "sb";
                        k.style.display = "none";
                        k.setAttribute("sandbox", "allow-scripts");
                        document.getElementById("sb").replaceWith(k);
                        updateFoot(lastRun, 5000);
                    }, 5000);
                }

                window.addEventListener("message", function (e) {
                    if (!e.data || typeof e.data !== "object") return;
                    if (e.data.type === "console") {
                        addLog(e.data.payload);
                        if (!state.rigid)
                            document.getElementById("cl").scrollTop =
                                document.getElementById("cl").scrollHeight;
                    } else if (e.data.type === "done") {
                        clearTimeout(wdTimer);
                        updateFoot(lastRun, e.data.payload.duration);
                    }
                });

                /* ── Footer ── */
                function updateFoot(ts, dur) {
                    var d = new Date(ts),
                        h = String(d.getHours()).padStart(2, "0"),
                        m = String(d.getMinutes()).padStart(2, "0"),
                        s = String(d.getSeconds()).padStart(2, "0"),
                        ms = String(d.getMilliseconds()).padStart(3, "0");
                    document.getElementById("ft").textContent =
                        h + ":" + m + ":" + s + "." + ms;
                    document.getElementById("fd").textContent =
                        dur.toFixed(1) + " ms";
                }

                /* ── Console rendering ── */
                function previewOf(n) {
                    switch (n.t) {
                        case "string": {
                            var s = JSON.stringify(n.v);
                            return s.length > 70 ? s.slice(0, 67) + '..."' : s;
                        }
                        case "number":
                        case "boolean":
                        case "bigint":
                            return String(n.v);
                        case "null":
                            return "null";
                        case "undefined":
                            return "undefined";
                        case "symbol":
                            return n.v;
                        case "function":
                            return "ƒ " + (n.name || "anonymous") + "()";
                        case "array": {
                            var pi = n.items
                                .slice(0, 5)
                                .map(previewOf)
                                .join(", ");
                            return (
                                "Array(" +
                                n.length +
                                ") [" +
                                pi +
                                (n.truncated || n.items.length < n.length
                                    ? ", …"
                                    : "") +
                                "]"
                            );
                        }
                        case "object": {
                            var po = n.entries
                                .slice(0, 4)
                                .map(function (e) {
                                    return e[0] + ": " + previewOf(e[1]);
                                })
                                .join(", ");
                            return (
                                (n.ctor ? n.ctor + " " : "") +
                                "{" +
                                po +
                                (n.entries.length > 4 || n.truncated
                                    ? ", …"
                                    : "") +
                                "}"
                            );
                        }
                        case "map": {
                            var pm = n.entries
                                .slice(0, 3)
                                .map(function (e) {
                                    return (
                                        previewOf(e[0]) +
                                        " => " +
                                        previewOf(e[1])
                                    );
                                })
                                .join(", ");
                            return (
                                "Map(" +
                                n.size +
                                ") {" +
                                pm +
                                (n.size > 3 ? ", …" : "") +
                                "}"
                            );
                        }
                        case "set": {
                            var ps = n.items
                                .slice(0, 3)
                                .map(previewOf)
                                .join(", ");
                            return (
                                "Set(" +
                                n.size +
                                ") {" +
                                ps +
                                (n.size > 3 ? ", …" : "") +
                                "}"
                            );
                        }
                        case "error":
                            return n.name + ": " + n.message;
                        case "date":
                            return n.v;
                        case "regexp":
                            return n.v;
                        case "circular":
                            return "[Circular]";
                        case "more":
                            return "…";
                        default:
                            return String(n.v);
                    }
                }

                function titleOf(args) {
                    var raw = args.map(previewOf).join("  ").trim();
                    var cleaned = raw.replace(/^"(.*)"$/, "$1");
                    var words = cleaned.split(/\s+/).slice(0, 3).join(" ");
                    if (words.length > 38) words = words.slice(0, 38) + "…";
                    return words || "(log)";
                }

                function labelOf(n) {
                    if (n.t === "array") return "Array(" + n.length + ")";
                    if (n.t === "map") return "Map(" + n.size + ")";
                    if (n.t === "set") return "Set(" + n.size + ")";
                    return (n.ctor ? n.ctor + " " : "") + "{…}";
                }

                function esc(s) {
                    return String(s).replace(/[&<>"]/g, function (c) {
                        return {
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            '"': "&quot;",
                        }[c];
                    });
                }

                function renderTree(n, top) {
                    var w = document.createElement("div");
                    w.className = "tn";
                    if (n.t === "error") {
                        var ne = document.createElement("div");
                        ne.innerHTML =
                            '<span class="terr">' +
                            esc(n.name) +
                            "</span>: " +
                            esc(n.message);
                        w.appendChild(ne);
                        if (n.stack) {
                            var se = document.createElement("div");
                            se.className = "tstack";
                            se.textContent = n.stack;
                            w.appendChild(se);
                        }
                        return w;
                    }
                    if (
                        n.t === "object" ||
                        n.t === "array" ||
                        n.t === "map" ||
                        n.t === "set"
                    ) {
                        var tg = document.createElement("span");
                        tg.className = "tt";
                        tg.textContent = top ? "▾" : "▸";
                        var lb = document.createElement("span");
                        lb.className = "tl";
                        lb.textContent = labelOf(n);
                        var ch = document.createElement("div");
                        ch.className = "tc";
                        if (!top) ch.hidden = true;
                        var ents;
                        if (n.t === "array")
                            ents = n.items.map(function (v, i) {
                                return [String(i), v];
                            });
                        else if (n.t === "object") ents = n.entries;
                        else if (n.t === "map")
                            ents = n.entries.map(function (e) {
                                return ["[" + previewOf(e[0]) + "]", e[1]];
                            });
                        else
                            ents = n.items.map(function (v, i) {
                                return [String(i), v];
                            });
                        ents.forEach(function (p) {
                            var cd = document.createElement("div");
                            cd.className = "te";
                            var ks = document.createElement("span");
                            ks.className = "tk";
                            ks.textContent = p[0] + ":";
                            cd.appendChild(ks);
                            cd.appendChild(renderTree(p[1], false));
                            ch.appendChild(cd);
                        });
                        function doTreeToggle(ev) {
                            ev.stopPropagation();
                            ch.hidden = !ch.hidden;
                            tg.textContent = ch.hidden ? "▸" : "▾";
                            /* Saat Log View OFF dan baru dibuka, scroll hd ke batas atas console */
                            if (!state.rigid && !ch.hidden) {
                                var cl = document.getElementById("cl");
                                var consoleTop = cl.getBoundingClientRect().top;
                                var hdTop = hd.getBoundingClientRect().top;
                                cl.scrollTo({
                                    top: cl.scrollTop + (hdTop - consoleTop),
                                    behavior: "smooth",
                                });
                            }
                        }
                        tg.addEventListener("click", doTreeToggle);
                        var hd = document.createElement("div");
                        hd.className = "th";
                        hd.appendChild(tg);
                        hd.appendChild(lb);
                        hd.addEventListener("click", doTreeToggle);
                        w.appendChild(hd);
                        w.appendChild(ch);
                    } else if (n.t === "function") {
                        var fn = document.createElement("span");
                        fn.className = "tfn";
                        fn.textContent =
                            "ƒ " +
                            (n.name || "anonymous") +
                            "  " +
                            (n.src ? n.src.slice(0, 120) : "");
                        w.appendChild(fn);
                    } else {
                        var vl = document.createElement("span");
                        var cls =
                            n.t === "string"
                                ? "tstr"
                                : n.t === "number"
                                  ? "tnum"
                                  : n.t === "boolean"
                                    ? "tbool"
                                    : n.t === "null"
                                      ? "tnul"
                                      : n.t === "undefined"
                                        ? "tund"
                                        : n.t === "bigint"
                                          ? "tbig"
                                          : n.t === "symbol"
                                            ? "tsym"
                                            : n.t === "date"
                                              ? "tdate"
                                              : n.t === "regexp"
                                                ? "trx"
                                                : "tl";
                        vl.className = cls;
                        vl.textContent =
                            n.t === "string"
                                ? JSON.stringify(n.v)
                                : previewOf(n);
                        w.appendChild(vl);
                    }
                    return w;
                }

                function addLog(entry) {
                    var row = document.createElement("div");
                    row.className = "lr l" + entry.level;
                    var sum = document.createElement("div");
                    sum.className = "ls";
                    var dot = document.createElement("span");
                    dot.className = "ld";
                    dot.textContent =
                        { log: "›", info: "i", warn: "!", error: "✕" }[
                            entry.level
                        ] || "›";
                    var prev = document.createElement("span");
                    prev.className = "lp";
                    prev.textContent = titleOf(entry.args);
                    var det = document.createElement("div");
                    det.className = "ldt";
                    entry.args.forEach(function (a) {
                        det.appendChild(renderTree(a, true));
                    });
                    sum.addEventListener("click", function () {
                        row.classList.toggle("exp");
                        if (!state.rigid && row.classList.contains("exp")) {
                            /* Auto-scroll: naikkan log ke atas console agar langsung terbaca */
                            var cl = document.getElementById("cl");
                            var consoleTop = cl.getBoundingClientRect().top;
                            var rowTop = row.getBoundingClientRect().top;
                            cl.scrollTo({
                                top: cl.scrollTop + (rowTop - consoleTop),
                                behavior: "smooth",
                            });
                        } else if (state.rigid && row.classList.contains("exp")) {
                            row.scrollIntoView({
                                behavior: "smooth",
                                block: "nearest",
                            });
                        }
                    });
                    sum.appendChild(dot);
                    sum.appendChild(prev);
                    row.appendChild(sum);
                    row.appendChild(det);
                    document.getElementById("cl").appendChild(row);
                }

                function clearConsole() {
                    document.getElementById("cl").innerHTML = "";
                }

                /* ── Konversi warna HEX <-> HSL (untuk slider tema) ── */
                function hexToHsl(hex) {
                    hex = (hex || "#888888").replace("#", "");
                    if (hex.length === 3)
                        hex = hex
                            .split("")
                            .map(function (c) {
                                return c + c;
                            })
                            .join("");
                    var r = parseInt(hex.substr(0, 2), 16) / 255,
                        g = parseInt(hex.substr(2, 2), 16) / 255,
                        b = parseInt(hex.substr(4, 2), 16) / 255;
                    var max = Math.max(r, g, b),
                        min = Math.min(r, g, b);
                    var h = 0,
                        s = 0,
                        l = (max + min) / 2;
                    if (max !== min) {
                        var d = max - min;
                        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                        switch (max) {
                            case r:
                                h = (g - b) / d + (g < b ? 6 : 0);
                                break;
                            case g:
                                h = (b - r) / d + 2;
                                break;
                            case b:
                                h = (r - g) / d + 4;
                                break;
                        }
                        h *= 60;
                    }
                    return { h: h, s: s * 100, l: l * 100 };
                }
                function hslToHex(h, s, l) {
                    h = ((h % 360) + 360) % 360;
                    s = Math.max(0, Math.min(100, s)) / 100;
                    l = Math.max(0, Math.min(100, l)) / 100;
                    var c = (1 - Math.abs(2 * l - 1)) * s,
                        x = c * (1 - Math.abs(((h / 60) % 2) - 1)),
                        m = l - c / 2,
                        r = 0,
                        g = 0,
                        b = 0;
                    if (h < 60) {
                        r = c; g = x; b = 0;
                    } else if (h < 120) {
                        r = x; g = c; b = 0;
                    } else if (h < 180) {
                        r = 0; g = c; b = x;
                    } else if (h < 240) {
                        r = 0; g = x; b = c;
                    } else if (h < 300) {
                        r = x; g = 0; b = c;
                    } else {
                        r = c; g = 0; b = x;
                    }
                    function toHex(v) {
                        var n = Math.max(0, Math.min(255, Math.round((v + m) * 255)));
                        return n.toString(16).padStart(2, "0");
                    }
                    return "#" + toHex(r) + toHex(g) + toHex(b);
                }

                /* ── File Manager ── */
                (function () {
                    var LS_INDEX   = "jspg_files";
                    var LS_ACTIVE  = "jspg_active";
                    var LS_ARCHIVE = "jspg_archive";
                    var LSC = function (n) { return "jspg_code:" + n; };

                    /* Init */
                    var files = JSON.parse(localStorage.getItem(LS_INDEX) || "null");
                    if (!files || !files.length) {
                        files = ["file-1"];
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                    }
                    var active = localStorage.getItem(LS_ACTIVE) || files[0];
                    if (files.indexOf(active) === -1) active = files[0];

                    /* Arsip: [{name, code}] */
                    function loadArchive() {
                        try { return JSON.parse(localStorage.getItem(LS_ARCHIVE) || "[]"); } catch(e) { return []; }
                    }
                    function saveArchive(arr) {
                        localStorage.setItem(LS_ARCHIVE, JSON.stringify(arr));
                    }

                    function saveActive() {
                        localStorage.setItem(LSC(active), cm.getValue());
                        localStorage.setItem(LS_ACTIVE, active);
                    }

                    function switchTo(name) {
                        saveActive();
                        active = name;
                        localStorage.setItem(LS_ACTIVE, active);
                        var code = localStorage.getItem(LSC(active));
                        cm.setValue(code !== null ? code : "");
                        document.getElementById("bfile-label").textContent = active;
                        renderDrop();
                        cm.focus();
                    }

                    function newFile() {
                        saveActive();
                        var idx = 1;
                        while (files.indexOf("file-" + idx) !== -1) idx++;
                        var name = "file-" + idx;
                        files.push(name);
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.setItem(LSC(name), "");
                        switchTo(name);
                    }

                    /* Hapus → arsip, bukan hapus beneran */
                    function archiveFile(name) {
                        if (files.length === 1) return; /* jangan arsip file terakhir */
                        saveActive();
                        var code = localStorage.getItem(LSC(name)) || "";
                        var arc = loadArchive();
                        /* hindari duplikat nama di arsip */
                        var arcName = name;
                        var cnt = 1;
                        while (arc.some(function(a){ return a.name === arcName; })) {
                            arcName = name + "-" + (++cnt);
                        }
                        arc.push({ name: arcName, code: code });
                        saveArchive(arc);
                        files = files.filter(function (f) { return f !== name; });
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.removeItem(LSC(name));
                        if (active === name) switchTo(files[0]);
                        else renderDrop();
                    }

                    /* Kembalikan dari arsip ke daftar file */
                    function restoreFile(arcName) {
                        var arc = loadArchive();
                        var item = null;
                        arc = arc.filter(function(a) { if(a.name===arcName){item=a;return false;} return true; });
                        if (!item) return;
                        saveArchive(arc);
                        var finalName = arcName;
                        var cnt2 = 1;
                        while (files.indexOf(finalName) !== -1) finalName = arcName + "-" + (++cnt2);
                        files.push(finalName);
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.setItem(LSC(finalName), item.code);
                        renderDrop();
                        renderArchivePanel();
                    }

                    /* Hapus permanen dari arsip */
                    function permDeleteFile(arcName) {
                        var arc = loadArchive().filter(function(a){ return a.name !== arcName; });
                        saveArchive(arc);
                        renderArchivePanel();
                    }

                    function renameFile(oldName, newName) {
                        newName = newName.trim().replace(/[^a-zA-Z0-9_\-. ]/g, "").slice(0, 32);
                        if (!newName || newName === oldName || files.indexOf(newName) !== -1) return oldName;
                        var code = localStorage.getItem(LSC(oldName)) || "";
                        files = files.map(function (f) { return f === oldName ? newName : f; });
                        localStorage.setItem(LS_INDEX, JSON.stringify(files));
                        localStorage.setItem(LSC(newName), code);
                        localStorage.removeItem(LSC(oldName));
                        if (active === oldName) {
                            active = newName;
                            localStorage.setItem(LS_ACTIVE, active);
                            document.getElementById("bfile-label").textContent = active;
                        }
                        return newName;
                    }

                    function renderDrop() {
                        var drop = document.getElementById("fdrop");
                        drop.innerHTML = "";
                        files.forEach(function (fileName) {
                            (function (name) {
                                var row = document.createElement("div");
                                row.className = "fdrop-file" + (name === active ? " active" : "");

                                var ico = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                                ico.setAttribute("viewBox", "0 0 24 24");
                                ico.setAttribute("fill", "none");
                                ico.setAttribute("stroke", "currentColor");
                                ico.setAttribute("stroke-width", "2");
                                ico.setAttribute("stroke-linecap", "round");
                                ico.setAttribute("stroke-linejoin", "round");

                                function startRename() {
                                    lbl.contentEditable = "true";
                                    lbl.focus();

                                    rng.selectNodeContents(lbl);
                                    window.getSelection().removeAllRanges();
                                    window.getSelection().addRange(rng);
                                }

                                lbl.addEventListener("dblclick", function (e) {
                                    e.stopPropagation();
                                    startRename();
                                });
                                lbl.addEventListener("keydown", function (e) {
                                    if (e.key === "Enter") { e.preventDefault(); lbl.blur(); }
                                    if (e.key === "Escape") { lbl.textContent = name; lbl.blur(); }
                                });
                                lbl.addEventListener("blur", function () {
                                    lbl.contentEditable = "false";
                                    renameFile(name, lbl.textContent);
                                    renderDrop();
                                });

                                var ren = document.createElement("span");
                                ren.className = "fdrop-action fdrop-ren";
                                ren.title = "Rename";
                                ren.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="11" height="11"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
                                ren.addEventListener("click", function (e) {

                                });

                                /* 1 klik → arsip (bukan hapus beneran) */
                                var del = document.createElement("span");
                                del.className = "fdrop-action fdrop-del";
                                wireArchiveBtn(del, {
                                    title: files.length === 1 ? "Tidak bisa hapus file terakhir" : "Pindah ke arsip",
                                    onArchive: function () {
                                        if (files.length > 1) archiveFile(name);
                                    }
                                });

                                row.appendChild(ico);
                                row.appendChild(lbl);
                                row.appendChild(ren);
                                row.appendChild(del);
                                row.addEventListener("click", function () {
                                    if (name !== active) switchTo(name);
                                });
                                drop.appendChild(row);
                            })(fileName);
                        });

                        var sep = document.createElement("div");
                        sep.className = "fdrop-sep";
                        drop.appendChild(sep);

                        var btnNew = document.createElement("div");
                        btnNew.className = "fdrop-new";
                        btnNew.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> File baru';
                        btnNew.addEventListener("click", newFile);
                        drop.appendChild(btnNew);
                    }

                    /* ── Panel Arsip ── */
                    function renderArchivePanel() {
                        var list = document.getElementById("arc-list");
                        list.innerHTML = "";

                        document.getElementById("arc-head-title").textContent =

                                edit.addEventListener("click", function (e) {

                            row.addEventListener("click", function () {

                            btnArcThm.addEventListener("click", function() { openThemeArchivePanel(); });

                    var LS_THEME_ARC = "jspg_theme_archive";
                    function loadThemeArchive() {
                        try { return JSON.parse(localStorage.getItem(LS_THEME_ARC) || "[]"); } catch(e) { return []; }
                    }
                    function saveThemeArchive(arr) { localStorage.setItem(LS_THEME_ARC, JSON.stringify(arr)); }

                    function archiveTheme(id) {
                        var custom = loadCustomThemes();
                        var found = null;
                        custom = custom.filter(function(t){ if(t.id===id){found=t;return false;} return true; });
                        if (!found) return;
                        saveCustomThemes(custom);
                        var arc = loadThemeArchive();
                        arc.push(found);
                        saveThemeArchive(arc);
                        if (getActiveThemeId() === id) applyTheme(BUILTIN_THEMES.ocean);
                        else renderThemeDrop();
                    }

                    function restoreTheme(id) {
                        var arc = loadThemeArchive();
                        var found = null;
                        arc = arc.filter(function(t){ if(t.id===id){found=t;return false;} return true; });
                        if (!found) return;
                        saveThemeArchive(arc);
                        var custom = loadCustomThemes();
                        custom.push(found);
                        saveCustomThemes(custom);
                        renderThemeDrop();
                        renderThemeArchivePanel();
                    }

                    function permDeleteTheme(id) {
                        var arc = loadThemeArchive().filter(function(t){ return t.id !== id; });
                        saveThemeArchive(arc);
                        renderThemeArchivePanel();
                    }

                    function openThemeArchivePanel() {
                        document.getElementById("arc-head-title").textContent = "";
                        renderThemeArchivePanel();
                        document.getElementById("arc-overlay").classList.add("show");
                    }

                        var list = document.getElementById("arc-list");
                        list.innerHTML = "";

                            rest.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.27"/></svg> Kembalikan';
                            rest.addEventListener("click", function() { restoreTheme(theme.id); });

                            var perm = document.createElement("button");
                            perm.className = "arc-perm";
                            perm.title = "Hapus permanen";
