<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, maximum-scale=1"
        />
        <title>JS Playground</title>
        <link
            rel="icon"
            type="image/png"
            href="https://img.icons8.com/nolan/64/forward.png"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/gruvbox-dark.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/fold/foldgutter.min.css"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=PT+Mono&family=Noto+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5/index.min.css" rel="stylesheet" />
        <style>
            :root {
                --b0: #0e1520;
                --b0s: #121c2e;
                --b1: #1a2540;
                --b2: #253050;
                --b3: #334068;
                --b4: #4d6080;
                --f1: #8a9ab0;
                --f2: #91beea;
                --f3: #90aac8;
                --f4: #6079a9;
                /* ── Default: warna kode syntax ── */
                --pur: #7ad8cc;   /* Keyword */
                --blu: #4faaff;   /* Variabel */
                --green: #9292fa; /* String */
                --ora: #b070c2;   /* Angka */
                --yel: #d95cff;   /* Definisi / Operator */
                --aqu: #d3a266;   /* Builtin / Meta */
                --red: #9070b0;   /* Tag / Error */
                --gry: #4f74b6;   /* Komentar */
                --acc: #6b80d7;   /* Aksen UI */
                --sel: #557fb2;   /* Warna Seleksi */
                --rad: 6px;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family: "Geist Mono", ui-monospace, Consolas, monospace;
                background: var(--b0);
                color: var(--f1);
                height: 100dvh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                -webkit-tap-highlight-color: transparent;
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100%;
                min-height: 0;
            }

            /* ── File Manager ── */
            #bfile-wrap {
                position: relative;
                display: flex;
                align-items: center;
            }
            #bfile {
                display: flex;
                align-items: center;
                gap: 4px;
                height: 26px;
                padding: 0 7px;
                flex-shrink: 0;
                border-radius: var(--rad);
                border: 1px solid var(--b2);
                background: var(--b1);
                color: var(--f2);
                cursor: pointer;
                font-family: inherit;
                font-size: 11.5px;
                white-space: nowrap;
                max-width: 120px;
                overflow: hidden;
                text-overflow: ellipsis;
                transition:
                    background 0.12s,
                    color 0.12s,
                    border-color 0.12s;
            }
            #bfile:hover,
            #bfile-wrap:hover #bfile {
                background: var(--b2);
                color: var(--f1);
                border-color: var(--b3);
            }
            #bfile svg {
                width: 12px;
                height: 12px;
                flex-shrink: 0;
                opacity: 0.7;
            }
            #fdrop {
                display: none;
                position: absolute;
                top: 100%; /* nempel langsung, tanpa gap */
                left: 0;
                min-width: 180px;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: var(--rad);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                z-index: 100;
                padding: 4px;
                flex-direction: column;
                gap: 2px;
                /* jembatan hover: pseudo-element di atas supaya mouse tidak "keluar" */
            }
            /* jembatan invisible di antara tombol dan dropdown */
            #bfile-wrap::after {
                content: "";
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                height: 8px; /* area jembatan */
                background: transparent;
            }
            #bfile-wrap:hover #fdrop,
            #fdrop:hover {
                display: flex;
            }
            .fdrop-file {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                color: var(--f2);
                transition:
                    background 0.1s,
                    color 0.1s;
                user-select: none;
            }
            .fdrop-file:hover {
                background: var(--b2);
                color: var(--f1);
            }
            .fdrop-file.active {
                background: var(--b2);
                color: var(--acc);
            }
            .fdrop-file svg {
                width: 12px;
                height: 12px;
                flex-shrink: 0;
                opacity: 0.6;
            }
            .fdrop-name {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .fdrop-name[contenteditable="true"] {
                outline: none;
                background: var(--b1);
                border-radius: 3px;
                padding: 0 3px;
                color: var(--f1);
            }
            .fdrop-action {
                opacity: 0;
                padding: 2px;
                border-radius: 3px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition:
                    opacity 0.1s,
                    color 0.1s,
                    background 0.1s;
                flex-shrink: 0;
                cursor: pointer;
            }
            .fdrop-file:hover .fdrop-action {
                opacity: 0.5;
            }
            .fdrop-action:hover {
                opacity: 1 !important;
                background: var(--b3);
            }
            .fdrop-ren {
                color: var(--aqu);
            }
            .fdrop-del {
                color: var(--red);
            }
            .fdrop-del.armed {
                color: var(--green) !important;
                opacity: 1 !important;
                background: rgba(114, 184, 158, 0.16);
            }
            @keyframes fdropPop {
                0% {
                    transform: scale(0.4) rotate(-120deg);
                    opacity: 0;
                }
                55% {
                    transform: scale(1.35) rotate(10deg);
                    opacity: 1;
                }
                80% {
                    transform: scale(0.92) rotate(-4deg);
                }
                100% {
                    transform: scale(1) rotate(0deg);
                }
            }
            .fdrop-action.pop svg {
                animation: fdropPop 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            .fdrop-sep {
                height: 1px;
                background: var(--b2);
                margin: 3px 0;
            }
            .fdrop-new {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 8px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
                color: var(--aqu);
                transition: background 0.1s;
            }
            .fdrop-new:hover {
                background: var(--b2);
            }
            .fdrop-new svg {
                width: 12px;
                height: 12px;
            }

            /* ── Archive panel (file & tema) ── */
            #arc-overlay {
                position: fixed;
                inset: 0;
                background: rgba(5, 8, 14, 0.55);
                z-index: 150;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.15s ease;
                padding: 14px;
            }
            #arc-overlay.show {
                opacity: 1;
                pointer-events: auto;
            }
            #arc-panel {
                width: 100%;
                max-width: 360px;
                max-height: 70vh;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
                transform: translateY(12px) scale(0.98);
                transition: transform 0.15s ease;
            }
            #arc-overlay.show #arc-panel {
                transform: translateY(0) scale(1);
            }
            #arc-head {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                border-bottom: 1px solid var(--b1);
                flex-shrink: 0;
            }
            #arc-head svg {
                width: 14px;
                height: 14px;
                color: var(--f4);
            }
            #arc-head-title {
                flex: 1;
                font-size: 13px;
                font-weight: 600;
                color: var(--f2);
            }
            #arc-close {
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                border: none;
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                font-family: inherit;
                transition:
                    background 0.1s,
                    color 0.1s;
            }
            #arc-close:hover {
                background: var(--b1);
                color: var(--f1);
            }
            #arc-list {
                flex: 1;
                overflow-y: auto;
                padding: 6px;
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .arc-empty {
                text-align: center;
                color: var(--f4);
                font-size: 12px;
                padding: 20px 0;
            }
            .arc-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 8px;
                border-radius: 5px;
                background: var(--b1);
            }
            .arc-item-name {
                flex: 1;
                font-size: 12px;
                color: var(--f2);
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .arc-restore {
                display: flex;
                align-items: center;
                gap: 4px;
                padding: 3px 8px;
                border-radius: 4px;
                border: 1px solid var(--b3);
                background: transparent;
                color: var(--green);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition: background 0.1s;
                white-space: nowrap;
            }
            .arc-restore:hover {
                background: var(--b2);
            }
            .arc-restore svg {
                width: 10px;
                height: 10px;
            }
            .arc-perm {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 22px;
                height: 22px;
                border-radius: 4px;
                border: none;
                background: transparent;
                color: var(--red);
                cursor: pointer;
                transition: background 0.1s;
                flex-shrink: 0;
            }
            .arc-perm:hover {
                background: rgba(208, 144, 152, 0.15);
            }
            .arc-perm svg {
                width: 11px;
                height: 11px;
            }

            /* ── Theme switcher dropdown (reuses .fdrop-* styles) ── */
            #bthm-wrap {
                position: relative;
                display: flex;
                align-items: center;
            }
            #bthm-wrap::after {
                content: "";
                position: absolute;
                top: 100%;
                right: 0;
                width: 100%;
                height: 8px;
                background: transparent;
            }
            #thdrop {
                display: none;
                position: absolute;
                top: 100%;
                right: 0;
                min-width: 215px;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: var(--rad);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                z-index: 100;
                padding: 4px;
                flex-direction: column;
                gap: 2px;
            }
            #bthm-wrap:hover #thdrop,
            #thdrop:hover {
                display: flex;
            }
            .thswatches {
                display: flex;
                gap: 2px;
                flex-shrink: 0;
            }
            .thdot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.08);
            }

            /* ── Font picker ── */
            #bfont-wrap {
                position: relative;
                display: flex;
                align-items: center;
            }
            #fontdrop {
                display: none;
                position: fixed; /* fixed biar bisa keluar dari parent overflow */
                min-width: 200px;
                background: var(--b0s);
                border: 1px solid var(--b2);
                border-radius: var(--rad);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
                z-index: 100;
                padding: 4px;
                flex-direction: column;
                gap: 2px;
            }
            #fontdrop.show {
                display: flex;
            }
            .font-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 10px;
                border-radius: 4px;
                cursor: pointer;
                transition: background 0.1s;
                user-select: none;
            }
            .font-item:hover {
                background: var(--b2);
            }
            .font-item.active {
                background: var(--b2);
                color: var(--acc);
            }
            .font-item-name {
                font-size: 12.5px;
                color: var(--f2);
                flex: 1;
            }
            .font-item.active .font-item-name {
                color: var(--acc);
            }
            .font-item-preview {
                font-size: 11px;
                color: var(--f4);
                letter-spacing: 0.03em;
            }
            .font-sep {
                height: 1px;
                background: var(--b2);
                margin: 3px 0;
            }
            .font-size-row {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 10px 7px;
            }
            .font-size-label {
                font-size: 11px;
                color: var(--f4);
                flex: 1;
            }
            .font-size-btn {
                width: 22px;
                height: 22px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 4px;
                border: 1px solid var(--b3);
                background: var(--b1);
                color: var(--f2);
                font-family: inherit;
                font-size: 14px;
                cursor: pointer;
                line-height: 1;
                transition: background 0.1s;
                flex-shrink: 0;
            }
            .font-size-btn:hover { background: var(--b2); }
            .font-size-val {
                font-size: 12px;
                color: var(--f2);
                min-width: 26px;
                text-align: center;
                font-variant-numeric: tabular-nums;
            }
            #thed-overlay {
                position: fixed;
                inset: 0;
                background: transparent;
                z-index: 200;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.18s ease;
                padding: 14px;
            }
            #thed-overlay.show {
                opacity: 1;
                pointer-events: auto;
            }
            #thed {
                width: 100%;
                max-width: 420px;
                min-width: 260px;
                min-height: 200px;
                max-height: 86vh;
                background: var(--b0s);
                border: 1px solid var(--b3);
                border-radius: 10px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
                transform: translateY(14px) scale(0.98);
                transition: transform 0.18s ease;
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
                position: absolute;
            }
            #thed-overlay.show #thed {
                transform: translateY(0) scale(1);
            }
            #thed-copy {
                width: 26px;
                height: 26px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 5px;
                border: 1px solid var(--b2);
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                transition:
                    background 0.1s,
                    color 0.1s,
                    border-color 0.1s;
            }
            #thed-copy:hover {
                background: var(--b1);
                color: var(--f1);
                border-color: var(--b3);
            }
            #thed-copy.copied {
                color: var(--green);
                border-color: var(--green);
                background: rgba(114, 184, 158, 0.12);
            }
            #thed-copy svg { pointer-events: none; }
            #thed-paste {
                width: 26px; height: 26px; flex-shrink: 0;
                display: flex; align-items: center; justify-content: center;
                border-radius: 5px; border: 1px solid var(--b2);
                background: transparent; color: var(--f3); cursor: pointer;
                transition: background 0.1s, color 0.1s, border-color 0.1s;
            }
            #thed-paste:hover { background: var(--b1); color: var(--f1); border-color: var(--b3); }
            #thed-paste.pasted { color: var(--aqu); border-color: var(--aqu); background: rgba(114,170,184,0.12); }
            #thed-paste.error  { color: var(--red);  border-color: var(--red);  background: rgba(208,144,152,0.12); }
            #thed-paste.active { color: var(--aqu); border-color: var(--aqu); background: rgba(114,170,184,0.12); }
            #thed-paste svg { pointer-events: none; }

            /* ── Panel Paste Massal ── */
            #thed-paste-panel {
                display: none;
                flex-direction: column;
                gap: 6px;
                padding: 8px 12px 10px;
                border-bottom: 1px solid var(--b1);
                background: var(--b0s);
                flex-shrink: 0;
            }
            #thed-paste-panel.show { display: flex; }
            #thed-paste-ta {
                width: 100%;
                min-height: 88px;
                max-height: 180px;
                background: var(--b1);
                border: 1px solid var(--b3);
                border-radius: 5px;
                color: var(--f2);
                font-family: inherit;
                font-size: 11.5px;
                line-height: 1.55;
                padding: 7px 10px;
                resize: vertical;
                outline: none;
                transition: border-color 0.12s;
            }
            #thed-paste-ta:focus { border-color: var(--acc); }
            #thed-paste-ta::placeholder { color: var(--f4); opacity: 0.8; }
            #thed-paste-info {
                font-size: 10.5px;
                color: var(--f4);
                display: flex;
                align-items: center;
                gap: 6px;
            }
            #thed-paste-info.has-colors { color: var(--aqu); }
            #thed-paste-preview {
                display: flex;
                flex-wrap: wrap;
                gap: 3px;
                margin-top: 2px;
            }
            .tpprev-dot {
                width: 10px;
                height: 10px;
                border-radius: 3px;
                border: 1px solid rgba(255,255,255,0.08);
                flex-shrink: 0;
            }

            /* Toast notifikasi copy */
            #copy-toast {
                position: fixed;
                bottom: 24px;
                left: 50%;
                transform: translateX(-50%) translateY(12px);
                background: var(--b2);
                border: 1px solid var(--b3);
                color: var(--f1);
                font-size: 12px;
                padding: 7px 14px;
                border-radius: 20px;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
                opacity: 0;
                pointer-events: none;
                transition:
                    opacity 0.15s ease,
                    transform 0.15s ease;
                z-index: 300;
                white-space: nowrap;
            }
            #copy-toast.show {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }

            #thed-head {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px;
                border-bottom: 1px solid var(--b1);
                flex-shrink: 0;
                cursor: default;
            }
            #thed-head svg {
                width: 14px;
                height: 14px;
                color: var(--f4);
                flex-shrink: 0;
            }
            #thed-name {
                font-size: 13px;
                color: var(--f2);
                font-weight: 600;
                outline: none;
                border-radius: 4px;
                padding: 2px 5px;
                min-width: 40px;
                flex: 1;
            }
            #thed-name[contenteditable="true"]:focus {
                background: var(--b1);
            }
            #thed-body {
                flex: 1;
                overflow-y: auto;
                padding: 4px 6px 10px;
            }
            /* Resize handles — diisi JS */
            .thed-rh {
                position: absolute;
                z-index: 20;
            }
            .thed-rh-n  { top:0;    left:10px;  right:10px; height:5px; cursor:n-resize;  }
            .thed-rh-s  { bottom:0; left:10px;  right:10px; height:5px; cursor:s-resize;  }
            .thed-rh-e  { right:0;  top:10px;   bottom:10px;width:5px;  cursor:e-resize;  }
            .thed-rh-w  { left:0;   top:10px;   bottom:10px;width:5px;  cursor:w-resize;  }
            .thed-rh-ne { top:0;    right:0;    width:14px; height:14px;cursor:ne-resize; }
            .thed-rh-nw { top:0;    left:0;     width:14px; height:14px;cursor:nw-resize; }
            .thed-rh-se { bottom:0; right:0;    width:14px; height:14px;cursor:se-resize; }
            .thed-rh-sw { bottom:0; left:0;     width:14px; height:14px;cursor:sw-resize; }
            .thgroup-h {
                font-size: 10.5px;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--f4);
                padding: 10px 8px 4px;
            }
            .throw {
                border-radius: 6px;
                overflow: hidden;
            }
            .throw-h {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 8px;
                cursor: pointer;
                border-radius: 6px;
                transition: background 0.1s;
                user-select: none;
            }
            .throw-h:hover {
                background: var(--b1);
            }
            .throw.expanded > .throw-h {
                background: var(--b1);
            }
            .thsw {
                width: 18px;
                height: 18px;
                border-radius: 5px;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: inset 0 0 0 2px rgba(0, 0, 0, 0.15);
                transition: background 0.05s linear;
            }
            .thlabel {
                flex: 1;
                font-size: 12.5px;
                color: var(--f2);
            }
            .thhex {
                font-size: 11px;
                color: var(--f4);
                font-variant-numeric: tabular-nums;
            }
            .thok {
                color: var(--green);
                flex-shrink: 0;
                display: flex;
            }
            .thok svg {
                width: 12px;
                height: 12px;
            }
            .thpicker {
                display: none;
                flex-direction: column;
                gap: 0;
                padding: 0 10px 12px 10px;
            }
            .throw.expanded .thpicker {
                display: flex;
            }

            /* ── Color Picker (HSV canvas + hue slider + hex input) ── */
            .cpk-wrap {
                display: flex;
                flex-direction: column;
                gap: 8px;
                padding: 8px 0 4px;
            }
            .cpk-canvas-wrap {
                position: relative;
                width: 100%;
                height: 140px;
                border-radius: 5px;
                overflow: hidden;
                cursor: crosshair;
                flex-shrink: 0;
            }
            .cpk-canvas {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                display: block;
            }
            .cpk-thumb {
                position: absolute;
                width: 12px;
                height: 12px;
                border-radius: 50%;
                border: 2px solid #fff;
                box-shadow:
                    0 0 0 1px rgba(0, 0, 0, 0.5),
                    0 1px 3px rgba(0, 0, 0, 0.5);
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            .cpk-hue-wrap {
                position: relative;
                height: 14px;
                border-radius: 7px;
                background: linear-gradient(
                    to right,
                    #f00,
                    #ff0,
                    #0f0,
                    #0ff,
                    #00f,
                    #f0f,
                    #f00
                );
                cursor: pointer;
                overflow: visible;
            }
            .cpk-hue-thumb {
                position: absolute;
                top: 50%;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #fff;
                border: 2px solid #fff;
                box-shadow:
                    0 0 0 1px rgba(0, 0, 0, 0.4),
                    0 1px 3px rgba(0, 0, 0, 0.5);
                transform: translate(-50%, -50%);
                pointer-events: none;
            }
            .cpk-hex-row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .cpk-swatch {
                width: 22px;
                height: 22px;
                border-radius: 5px;
                flex-shrink: 0;
                border: 1px solid rgba(255, 255, 255, 0.12);
            }
            .cpk-hex-input {
                flex: 1;
                background: var(--b1);
                border: 1px solid var(--b3);
                border-radius: 5px;
                color: var(--f2);
                font-family: inherit;
                font-size: 12px;
                padding: 4px 8px;
                outline: none;
                letter-spacing: 0.05em;
            }
            .cpk-hex-input:focus {
                border-color: var(--acc);
            }
            .thconfirm {
                align-self: flex-start;
                display: flex;
                align-items: center;
                gap: 5px;
                margin-top: 2px;
                padding: 5px 10px;
                border-radius: var(--rad);
                border: 1px solid var(--b3);
                background: var(--b1);
                color: var(--green);
                font-family: inherit;
                font-size: 11.5px;
                cursor: pointer;
                transition: background 0.12s;
            }
            .thconfirm:hover {
                background: var(--b2);
            }
            .thconfirm svg {
                width: 11px;
                height: 11px;
            }
            #thed-save {
                width: 26px;
                height: 26px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 5px;
                border: 1px solid var(--b3);
                background: transparent;
                color: var(--green);
                cursor: pointer;
                transition: background 0.1s, color 0.1s, border-color 0.1s;
            }
            #thed-save:hover {
                background: var(--b1);
                border-color: var(--green);
            }
            #thed-save svg { pointer-events: none; }
            #thed-cancel {
                width: 26px;
                height: 26px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 5px;
                border: 1px solid var(--b2);
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                transition: background 0.1s, color 0.1s;
            }
            #thed-cancel:hover {
                background: var(--b1);
                color: var(--f1);
            }
            #thed-cancel svg { pointer-events: none; }

            /* ── Toolbar ── */
            #tb {
                display: flex;
                align-items: center;
                gap: 3px;
                padding: 6px 8px;
                background: var(--b0s);
                border-bottom: 1px solid var(--b2);
                flex-wrap: wrap;
                flex-shrink: 0;
            }
            .sp {
                flex: 1 1 auto;
                min-width: 4px;
            }
            .sep {
                width: 1px;
                height: 18px;
                background: var(--b2);
                margin: 0 3px;
                flex-shrink: 0;
            }
            .btn {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 26px;
                height: 26px;
                flex-shrink: 0;
                border-radius: var(--rad);
                border: 1px solid transparent;
                background: transparent;
                color: var(--f3);
                cursor: pointer;
                transition:
                    background 0.12s,
                    color 0.12s,
                    border-color 0.12s;
            }
            .btn svg {
                width: 15px;
                height: 15px;
                pointer-events: none;
            }
            .btn:hover {
                background: var(--b1);
                color: var(--f1);
            }
            .btn:active {
                transform: translateY(1px);
            }
            .btn.on {
                background: var(--b2);
                color: var(--acc);
                border-color: var(--b3);
            }
            .btn.run {
                color: var(--green);
            }
            .btn.run:hover {
                background: var(--b1);
                color: var(--green);
            }

            /* ── Panels ── */
            #panels {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-height: 0;
            }
            #ep {
                flex: 0 0 60%;
                min-height: 0;
                overflow: hidden;
            }
            #ed {
                height: 100%;
            }
            #dv {
                flex: 0 0 6px;
                background: var(--b1);
                cursor: row-resize;
                position: relative;
                touch-action: none;
            }
            #dv::after {
                content: "";
                position: absolute;
                left: 50%;
                top: 50%;
                transform: translate(-50%, -50%);
                width: 32px;
                height: 3px;
                border-radius: 2px;
                background: var(--b3);
            }
            #dv:hover,
            #dv.drag {
                background: var(--b2);
            }
            #dv:hover::after,
            #dv.drag::after {
                background: var(--acc);
            }
            #cp {
                flex: 0 0 40%;
                min-height: 0;
                display: flex;
                flex-direction: column;
                background: var(--b0);
                overflow: hidden;
            }
            #cl {
                flex: 1;
                overflow-y: auto;
                padding: 2px 0;
            }
            #cf {
                flex-shrink: 0;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 6px 10px 7px;
                font-size: 10px;
                color: var(--f4);
                border-top: 1px solid var(--b1);
                background: var(--b0s);
                font-variant-numeric: tabular-nums;
                gap: 8px;
                line-height: 0px;
            }
            #cf .fg {
                display: flex;
                align-items: center;
                gap: 4px;
                overflow: hidden;
                white-space: nowrap;
                transform: translateY(-3px);
            }
            #cf svg {
                width: 11px;
                height: 11px;
                flex-shrink: 0;
                opacity: 0.65;
            }

            /* ── CodeMirror ── */
            .CodeMirror {
                height: 100% !important;
                font-size: 14px;
                line-height: 1.55;
            }
            .cm-s-gruvbox-dark.CodeMirror,
            .cm-s-gruvbox-light.CodeMirror {
                background: var(--b0);
                color: var(--f1);
            }
            .cm-s-gruvbox-dark .CodeMirror-gutters,
            .cm-s-gruvbox-light .CodeMirror-gutters {
                background: var(--b0);
                border-right: 1px solid var(--b1);
            }
            .cm-s-gruvbox-dark .CodeMirror-linenumber,
            .cm-s-gruvbox-light .CodeMirror-linenumber {
                color: var(--b4);
            }
            /* Selektor diberi bobot ekstra (.cm-s-gruvbox-dark.CodeMirror ...) agar
               menang dari tema gruvbox eksternal yang memakai selector "span.cm-xxx"
               — tanpa ini, warna keyword/property/string "terkunci" ke warna
               bawaan gruvbox dan tidak ikut perubahan variabel tema. */
            .cm-s-gruvbox-dark.CodeMirror .cm-keyword,
            .cm-s-gruvbox-light.CodeMirror .cm-keyword {
                color: var(--pur);
                font-weight: 600;
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-atom,
            .cm-s-gruvbox-light.CodeMirror .cm-atom {
                color: var(--ora);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-number,
            .cm-s-gruvbox-light.CodeMirror .cm-number {
                color: var(--ora);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-def,
            .cm-s-gruvbox-light.CodeMirror .cm-def {
                color: var(--yel);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-variable,
            .cm-s-gruvbox-light.CodeMirror .cm-variable {
                color: var(--blu);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-variable-2,
            .cm-s-gruvbox-light.CodeMirror .cm-variable-2 {
                color: var(--blu);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-variable-3,
            .cm-s-gruvbox-light.CodeMirror .cm-variable-3 {
                color: var(--aqu);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-property,
            .cm-s-gruvbox-light.CodeMirror .cm-property {
                color: var(--blu);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-operator,
            .cm-s-gruvbox-light.CodeMirror .cm-operator {
                color: var(--yel);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-comment,
            .cm-s-gruvbox-light.CodeMirror .cm-comment {
                color: var(--gry);
                font-style: italic;
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-string,
            .cm-s-gruvbox-light.CodeMirror .cm-string {
                color: var(--green);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-string-2,
            .cm-s-gruvbox-light.CodeMirror .cm-string-2 {
                color: var(--green);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-meta,
            .cm-s-gruvbox-light.CodeMirror .cm-meta {
                color: var(--aqu);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-qualifier,
            .cm-s-gruvbox-light.CodeMirror .cm-qualifier {
                color: var(--yel);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-builtin,
            .cm-s-gruvbox-light.CodeMirror .cm-builtin {
                color: var(--aqu);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-bracket,
            .cm-s-gruvbox-light.CodeMirror .cm-bracket {
                color: var(--f3);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-tag,
            .cm-s-gruvbox-light.CodeMirror .cm-tag {
                color: var(--red);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-attribute,
            .cm-s-gruvbox-light.CodeMirror .cm-attribute {
                color: var(--yel);
            }
            .cm-s-gruvbox-dark.CodeMirror .cm-error,
            .cm-s-gruvbox-light.CodeMirror .cm-error {
                color: var(--red);
                text-decoration: underline wavy;
            }
            .cm-s-gruvbox-dark .CodeMirror-cursor,
            .cm-s-gruvbox-light .CodeMirror-cursor {
                border-left: 2px solid var(--f1);
            }
            /* Warna seleksi & active-line dikelola dinamis oleh applyTheme() via #dyn-sel */
            .cm-s-gruvbox-dark .CodeMirror-matchingbracket,
            .cm-s-gruvbox-light .CodeMirror-matchingbracket {
                color: var(--green) !important;
                font-weight: bold;
                text-decoration: none;
            }
            .CodeMirror-foldmarker {
                color: var(--yel);
                text-shadow: none;
                font-family: inherit;
                padding: 0 2px;
            }
            .CodeMirror-foldgutter-open,
            .CodeMirror-foldgutter-folded {
                color: var(--f4);
                cursor: pointer;
            }
            .CodeMirror-foldgutter-open:after {
                content: "\25BE";
            }
            .CodeMirror-foldgutter-folded:after {
                content: "\25B8";
            }

            /* ── Indent Guide Lines ── */
            .CodeMirror-code {
                position: relative;
            }
            /* Canvas overlay tepat di atas code area, pointer-events:none */
            #ig-canvas {
                position: absolute;
                inset: 0;
                pointer-events: none;
                z-index: 2;
                overflow: hidden;
            }
            .CodeMirror-hints {
                background: var(--b0s);
                border: 1px solid var(--b2);
                color: var(--f1);
                font-family: inherit;
                font-size: 13px;
                border-radius: var(--rad);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
                padding: 3px;
                z-index: 50;
            }
            .CodeMirror-hint {
                padding: 3px 10px;
                border-radius: 4px;
                color: var(--f2);
                white-space: nowrap;
            }
            li.CodeMirror-hint-active {
                background: var(--b2);
                color: var(--acc);
            }

            /* ── Console rows ── */
            .lr {
                border-bottom: 1px solid var(--b1);
            }
            .ls {
                display: flex;
                align-items: flex-start;
                gap: 7px;
                padding: 5px 8px;
                font-size: 12.5px;
                cursor: pointer;
            }
            .ls:hover {
                background: var(--b0s);
            }
            .ld {
                flex-shrink: 0;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                margin-top: 1px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 9px;
                font-weight: 700;
            }
            .llog .ld {
                background: var(--b2);
                color: var(--f3);
            }
            .linfo .ld {
                background: rgba(255, 94, 188, 0.18);
                color: var(--blu);
            }
            .lwarn .ld {
                background: rgba(232, 201, 122, 0.18);
                color: var(--yel);
            }
            .lerror .ld {
                background: rgba(255, 110, 110, 0.18);
                color: var(--red);
            }
            .lp {
                flex: 1;
                min-width: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                color: var(--f2);
            }
            .lerror .lp {
                color: var(--red);
            }
            .lwarn .lp {
                color: var(--yel);
            }
            .lr.exp .lp {
                white-space: normal;
            }
            .ldt {
                display: none;
                padding: 2px 10px 10px 31px;
                font-size: 12px;
                color: var(--f2);
            }
            .lr.exp .ldt {
                display: block;
            }

            /* ── Object tree ── */
            .tn {
                line-height: 1.65;
            }
            .th {
                display: flex;
                align-items: baseline;
                gap: 3px;
                cursor: pointer;
                user-select: none;
            }
            .tt {
                color: var(--f4);
                width: 11px;
                display: inline-block;
                font-size: 9px;
                flex-shrink: 0;
            }
            .tl {
                color: var(--f3);
            }
            .tc {
                margin-left: 14px;
                padding-left: 7px;
                border-left: 1px dashed var(--b2);
            }
            .te {
                display: flex;
                gap: 3px;
                flex-wrap: wrap;
            }
            .tk {
                color: var(--aqu);
                flex-shrink: 0;
            }
            .tstr {
                color: var(--green);
            }
            .tnum,
            .tbig {
                color: var(--ora);
            }
            .tbool {
                color: var(--pur);
            }
            .tnul,
            .tund {
                color: var(--gry);
                font-style: italic;
            }
            .tfn {
                color: var(--blu);
            }
            .tsym {
                color: var(--aqu);
            }
            .terr {
                color: var(--red);
                font-weight: 700;
            }
            .trx,
            .tdate {
                color: var(--yel);
            }
            .tstack {
                color: var(--f4);
                font-size: 11px;
                white-space: pre-wrap;
                margin-top: 2px;
            }

            /* ── Scrollbars ── */
            #cl::-webkit-scrollbar,
            .CodeMirror-vscrollbar::-webkit-scrollbar,
            .CodeMirror-hscrollbar::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }
            #cl::-webkit-scrollbar-track,
            .CodeMirror-vscrollbar::-webkit-scrollbar-track,
            .CodeMirror-hscrollbar::-webkit-scrollbar-track {
                background: var(--b0);
            }
            #cl::-webkit-scrollbar-thumb,
            .CodeMirror-vscrollbar::-webkit-scrollbar-thumb,
            .CodeMirror-hscrollbar::-webkit-scrollbar-thumb {
                background: var(--b2);
                border-radius: 4px;
            }
            #cl::-webkit-scrollbar-thumb:hover,
            .CodeMirror-vscrollbar::-webkit-scrollbar-thumb:hover,
            .CodeMirror-hscrollbar::-webkit-scrollbar-thumb:hover {
                background: var(--b3);
            }
            /* Sudut antara vscrollbar & hscrollbar */
            .CodeMirror-scroll::-webkit-scrollbar-corner {
                background: var(--b0);
            }
            /* Sembunyikan filler pojok yang muncul sebagai "ghost scrollbar"
               saat word-wrap mati dan baris panjang muncul */
            .CodeMirror-scrollbar-filler,
            .CodeMirror-gutter-filler {
                background: var(--b0) !important;
            }

            @media (max-width: 480px) {
                .btn {
                    width: 28px;
                    height: 28px;
                }
                .CodeMirror {
                    font-size: 13px;
                }
                #cf {
                    font-size: 10px;
                }
                .ls,
                .ldt {
                    font-size: 12px;
                }
            }
        </style>
    </head>
    <body class="theme-ember">
        <div id="app">
            <div id="tb">
                <!-- KIRI: file | no baris | word wrap | rapikan | hapus -->
                <div id="bfile-wrap">
                    <button
                        id="bfile"

                            viewBox="0 0 24 24"

                            <path
                                d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"
                            />
                            <polyline points="13 2 13 9 20 9" />
                        </svg>

                    </button>
                    <div id="fdrop"><!-- diisi JS --></div>
                </div>
                <button class="btn on" id="bln" title="Nomor baris">
                    <svg
                        viewBox="0 0 24 24"

                    >

                        <line x1="17" y1="4" x2="15" y2="20" />

                </button>
                <button class="btn" id="bww" title="Word Wrap">

                    >

                <button

                </button>
                <div id="bfont-wrap">

                            <polyline points="4 7 4 4 20 4 20 7"/>

                </div>
                <button class="btn" id="bclr" title="Bersihkan console">
                    <svg
                        viewBox="0 0 24 24"

                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                    >
                        <polyline points="3 6 5 6 21 6" />
                        <path
                            d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14z"

                        <line x1="10" y1="11" x2="10" y2="17" />

                <!-- SPACER -->
                <div class="sp"></div>

                <!-- KANAN: manual run | auto run | kunci scroll | mode color -->
                <button class="btn run" id="brun" title="Run (Ctrl+Enter)">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"

                    >
                        <path d="M6 4l13 8-13 8z" />

                </button>
                <button class="btn on" id="baut" title="Auto run">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"

        <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

        <script>
            (function () {
                "use strict";

                var state = {
                    autoRun: true,
                    rigid: false,
                    wordWrap: false,
                };
                var arTimer  = null,
                    wdTimer  = null, // ! watchdog infinite-loop timer
                    fsTimer  = null, // ! autosave file system timer
                    lastRun  = 0;

                var STARTER = [
                    "// JS Playground — Dark Blue Edition",
                    "// Tekan ▶ atau Ctrl+Enter untuk eksekusi",
                    "",
                    "const state = {",
                    '  user: { name: "Fajar", level: 2 },',
                    '  inventory: ["sword", "shield", "potion"],',
                    "};",
                    "",
                    'console.log("State awal:", state);',
                    "",
                    "const nextState = {",
                    "  ...state,",
                    "  user: { ...state.user, level: state.user.level + 1 },",
                    "};",
                    "",
                    'console.log("State setelah update:", nextState);',
                    'console.log("Immutability check:", state.user.level !== nextState.user.level);',
                    "",
                    "for (let i = 1; i <= 3; i++) {",
                    '  console.log("Loop ke-" + i, i * i);',
                    "}",
                ].join("\n");

                /* ── Autocomplete ── */
                function ownNames(obj) {
                    try {
                        return Object.getOwnPropertyNames(obj).filter(
                            function (n) {
                                return (
                                    !/^\d+$/.test(n) &&
                                    n !== "caller" &&
                                    n !== "arguments" &&
                                    n.indexOf("__") !== 0
                                );
                            },
                        );
                    } catch (e) {
                        return [];
                    }
                }
                var MD = {
                    Array: ownNames(Array).concat(ownNames(Array.prototype)),
                    String: ownNames(String).concat(ownNames(String.prototype)),
                    Object: ownNames(Object).concat(ownNames(Object.prototype)),
                    Number: ownNames(Number).concat(ownNames(Number.prototype)),
                    Boolean: ownNames(Boolean.prototype),
                    Math: ownNames(Math),
                    JSON: ownNames(JSON),
                    console: ownNames(console),
                    Promise: ownNames(Promise).concat(
                        ownNames(Promise.prototype),
                    ),
                    Map: ownNames(Map.prototype),
                    Set: ownNames(Set.prototype),
                    Date: ownNames(Date).concat(ownNames(Date.prototype)),
                    RegExp: ownNames(RegExp.prototype),
                    Function: ownNames(Function.prototype),
                    Symbol: ownNames(Symbol),
                    Error: ownNames(Error.prototype),
                };
                var GM = (function () {
                    var s = {},
                        o = [];
                    []
                        .concat(
                            ownNames(Array.prototype),
                            ownNames(Object.prototype),
                            ownNames(String.prototype),
                            ownNames(Number.prototype),
                            ownNames(Function.prototype),
                        )
                        .forEach(function (n) {
                            if (!s[n]) {
                                s[n] = 1;
                                o.push(n);
                            }
                        });
                    return o;
                })();
                var GN = [
                    "Array",
                    "Object",
                    "String",
                    "Number",
                    "Boolean",
                    "Math",
                    "JSON",
                    "console",
                    "Promise",
                    "Map",
                    "Set",
                    "WeakMap",
                    "WeakSet",
                    "Date",
                    "RegExp",
                    "Symbol",
                    "Error",
                    "TypeError",
                    "RangeError",
                    "SyntaxError",
                    "parseInt",
                    "parseFloat",
                    "isNaN",
                    "isFinite",
                    "NaN",
                    "Infinity",
                    "undefined",
                    "globalThis",
                    "Function",
                    "structuredClone",
                ];
                var KW = [
                    "break",
                    "case",
                    "catch",
                    "class",
                    "const",
                    "continue",
                    "debugger",
                    "default",
                    "delete",
                    "do",
                    "else",
                    "export",
                    "extends",
                    "finally",
                    "for",
                    "function",
                    "if",
                    "import",
                    "in",
                    "instanceof",
                    "let",
                    "new",
                    "return",
                    "super",
                    "switch",
                    "this",
                    "throw",
                    "try",
                    "typeof",
                    "var",
                    "void",
                    "while",
                    "with",
                    "yield",
                    "async",
                    "await",
                    "of",
                    "static",
                    "get",
                    "set",
                    "true",
                    "false",
                    "null",
                ];

                function scanIds(cm) {
                    var t = cm.getValue(),
                        ids = {},
                        re =
                            /\b(?:const|let|var|function\*?|class)\s+([A-Za-z_$][\w$]*)/g,
                        m;
                    while ((m = re.exec(t))) ids[m[1]] = 1;
                    var ra = /\(([^()]*)\)\s*=>/g;
                    while ((m = ra.exec(t))) {
                        m[1].split(",").forEach(function (p) {
                            var n = p
                                .trim()
                                .split(/[=:]/)[0]
                                .trim()
                                .replace(/[{}\[\].]/g, "");
                            if (/^[A-Za-z_$][\w$]*$/.test(n)) ids[n] = 1;
                        });
                    }
                    return Object.keys(ids);
                }
                function getTok(cm, cur) {
                    var line = cm.getLine(cur.line),
                        s = cur.ch,
                        e = cur.ch;
                    while (s > 0 && /[\w$]/.test(line.charAt(s - 1))) s--;
                    while (e < line.length && /[\w$]/.test(line.charAt(e))) e++;
                    var w = line.slice(s, e),
                        dot = false,
                        base = "";
                    if (s > 0 && line.charAt(s - 1) === ".") {
                        dot = true;
                        var be = s - 1,
                            bs = be;
                        while (bs > 0 && /[\w$]/.test(line.charAt(bs - 1)))
                            bs--;
                        base = line.slice(bs, be);
                    }
                    return {
                        start: s,
                        end: e,
                        word: w,
                        dotBefore: dot,
                        base: base,
                        line: cur.line,
                    };
                }
                function customHint(cm) {
                    var cur = cm.getCursor(),
                        tok = getTok(cm, cur),
                        list = [];
                    if (tok.dotBefore) {
                        var d = MD[tok.base] || GM;
                        list = d.filter(function (w) {
                            return (
                                w
                                    .toLowerCase()
                                    .indexOf(tok.word.toLowerCase()) === 0
                            );
                        });
                    } else {
                        var sc = scanIds(cm),
                            all = KW.concat(GN, sc),
                            seen = {};
                        list = all.filter(function (w) {
                            if (seen[w]) return false;
                            seen[w] = 1;
                            return (
                                w
                                    .toLowerCase()
                                    .indexOf(tok.word.toLowerCase()) === 0 &&
                                w.toLowerCase() !== tok.word.toLowerCase()
                            );
                        });
                    }
                    if (!list.length) return null;
                    list.sort();
                    return {
                        list: list.map(function (w) {
                            return { text: w, displayText: w };
                        }),
                        from: CodeMirror.Pos(tok.line, tok.start),
                        to: CodeMirror.Pos(tok.line, tok.end),
                    };
                }

                /* ── CodeMirror init ── */
                var cm = window.cm = CodeMirror(document.getElementById("ed"), {
                    value: STARTER,
                    mode: "javascript",
                    theme: "gruvbox-dark",
                    lineNumbers: true,
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    foldGutter: true,
                    styleActiveLine: true,
                    gutters: [
                        "CodeMirror-linenumbers",
                        "CodeMirror-foldgutter",
                    ],
                    indentUnit: 2,
                    tabSize: 2,
                    extraKeys: {
                        "Ctrl-Enter": function () {
                            runCode();
                        },
                        "Cmd-Enter": function () {
                            runCode();
                        },
                        "Ctrl-Space": "autocomplete",
                        "Alt-Space": "autocomplete",
                        Tab: function (c) {
                            if (c.somethingSelected()) c.indentSelection("add");
                            else c.replaceSelection("  ");
                        },
                        "Ctrl-/": function (c) { c.toggleComment({ indent: true }); },
                        "Cmd-/":  function (c) { c.toggleComment({ indent: true }); },
                    },
                    hintOptions: { hint: customHint, completeSingle: false },
                });
                cm.on("inputRead", function (c, ch) {
                    if (
                        ch.origin === "+input" &&
                        ch.text[0] &&
                        /[\w.]/.test(ch.text[0])
                    )
                        CodeMirror.commands.autocomplete(c, null, {
                            completeSingle: false,
                        });
                });
                var lastCode = cm.getValue().replace(/\s+/g, "");
                cm.on("change", function () {
                    clearTimeout(fsTimer);
                    fsTimer = setTimeout(function () {
                        localStorage.setItem("jspg_code", cm.getValue());
                    }, 500);
                    if (state.autoRun) {
                        var stripped = cm.getValue().replace(/\s+/g, "");
                        if (stripped === lastCode) return;
                        lastCode = stripped;
                        clearTimeout(arTimer);
                        arTimer = setTimeout(runCode, 700);
                    }
                });

                /* ── Indent Guide Lines — canvas overlay ── */
                (function () {
                    var igTimer;
                    var TAB = cm.getOption("indentUnit") || 2;

                    var scrollEl = cm.getScrollerElement();
                    var cvs = document.createElement("canvas");
                    cvs.style.cssText = "position:absolute;top:0;left:0;pointer-events:none;z-index:3;";
                    scrollEl.appendChild(cvs);
                    var ctx = cvs.getContext("2d");

                    // Cari scope bracket { } [ ] ( ) yang mengurung cursor
                    function findActiveScopes(cursor) {
                        var doc = cm.getDoc();
                        var src = doc.getValue();
                        var ci  = doc.indexFromPos(cursor);
                        var ops = ["{","[","("], cls = ["}","]",")"];
                        var stack = [], result = [];
                        for (var i = 0; i < src.length; i++) {
                            var oi = ops.indexOf(src[i]), ki = cls.indexOf(src[i]);
                            if (oi !== -1) { stack.push({ c: src[i], i: i }); }
                            else if (ki !== -1 && stack.length) {
                                var top = stack[stack.length - 1];
                                if (ops.indexOf(top.c) === ki) {
                                    stack.pop();
                                    if (top.i < ci && i >= ci) {
                                        var fp = doc.posFromIndex(top.i);
                                        var tp = doc.posFromIndex(i);
                                        if (tp.line > fp.line)
                                            result.push({ fromLine: fp.line, toLine: tp.line, col: fp.ch });
                                    }
                                }
                            }
                        }
                        return result;
                    }

                    function draw() {
                        var si   = cm.getScrollInfo();
                        var W    = si.width;
                        var H    = si.height;
                        var dpr  = window.devicePixelRatio || 1;

                        cvs.style.width  = W + "px";
                        cvs.style.height = H + "px";
                        cvs.width  = Math.round(W * dpr);
                        cvs.height = Math.round(H * dpr);
                        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                        ctx.clearRect(0, 0, W, H);

                        var cursor  = cm.getCursor();
                        var actives = findActiveScopes(cursor);

                        // activeCol[col] = [{fromLine, toLine}] untuk scope aktif
                        var activeCols = {};
                        actives.forEach(function(r) {
                            if (!activeCols[r.col]) activeCols[r.col] = [];
                            activeCols[r.col].push({ fromLine: r.fromLine, toLine: r.toLine });
                        });

                        var charW  = cm.defaultCharWidth();
                        var gutW   = cm.getGutterElement().offsetWidth;
                        var total  = cm.lineCount();
                        var wrapEl = cm.getWrapperElement();
                        var wrapTop = wrapEl.getBoundingClientRect().top;

                        // ── Pass 1: hitung indent tiap baris & Y coords ──
                        // Simpan sebagai array supaya bisa di-group
                        var lines = []; // { indent, top, bottom }
                        for (var ln = 0; ln < total; ln++) {
                            var lineText = cm.getLine(ln);
                            if (lineText === null) { lines.push(null); continue; }

                            var indent = 0;
                            if (lineText.trim() !== "") {
                                while (indent < lineText.length && lineText[indent] === " ") indent++;
                            } else {
                                // Baris kosong — interpolasi dari tetangga
                                var pi = 0, ni = 0;
                                for (var a = ln - 1; a >= Math.max(0, ln - 10); a--) {
                                    var pl = cm.getLine(a);
                                    if (pl && pl.trim()) { var c = 0; while (c < pl.length && pl[c] === " ") c++; pi = c; break; }
                                }
                                for (var b = ln + 1; b <= Math.min(total - 1, ln + 10); b++) {
                                    var nl = cm.getLine(b);
                                    if (nl && nl.trim()) { var c = 0; while (c < nl.length && nl[c] === " ") c++; ni = c; break; }
                                }
                                indent = Math.max(pi, ni);
                            }

                            var coords = cm.charCoords({ line: ln, ch: 0 }, "page");
                            var lineTop    = coords.top    - wrapTop + si.top;
                            var lineBottom = coords.bottom - wrapTop + si.top;
                            lines.push({ indent: indent, top: lineTop, bottom: lineBottom });
                        }

                        // ── Pass 2: per kolom indent, kumpulkan segmen baris berurutan ──
                        // Cari semua kolom yang pernah muncul
                        var maxIndent = 0;
                        lines.forEach(function(l) { if (l && l.indent > maxIndent) maxIndent = l.indent; });

                        for (var col = TAB; col <= maxIndent; col += TAB) {
                            // Kumpulkan run: baris berurutan yang punya indent >= col
                            var runs = []; // [{topY, bottomY, active}]
                            var runStart = null;

                            for (var ln2 = 0; ln2 < lines.length; ln2++) {
                                var l = lines[ln2];
                                var hasLevel = l && l.indent >= col;
                                if (hasLevel) {
                                    if (runStart === null) runStart = { topY: l.top, bottomY: l.bottom, ln: ln2 };
                                    else runStart.bottomY = l.bottom;
                                    runStart.endLn = ln2;
                                } else {
                                    if (runStart !== null) { runs.push(runStart); runStart = null; }
                                }
                            }
                            if (runStart !== null) runs.push(runStart);

                            // Render tiap run sebagai satu garis vertikal panjang
                            var x = gutW + (col - TAB) * charW + Math.floor(charW / 2) + 0.5;

                            runs.forEach(function(run) {
                                // Cek apakah run ini overlap dengan scope aktif di kolom ini
                                var isAct = false;
                                if (activeCols[col - TAB]) {
                                    activeCols[col - TAB].forEach(function(r) {
                                        if (r.fromLine <= run.endLn && r.toLine >= run.ln) isAct = true;
                                    });
                                }

                                ctx.beginPath();
                                ctx.moveTo(x, run.topY);
                                ctx.lineTo(x, run.bottomY);
                                ctx.strokeStyle = isAct ? "rgba(107,128,215,0.75)" : "rgba(77,96,128,0.3)";
                                ctx.lineWidth   = isAct ? 1.5 : 1;
                                ctx.stroke();
                            });
                        }
                    }

                    function schedule() { clearTimeout(igTimer); igTimer = setTimeout(draw, 60); }
                    cm.on("change",         schedule);
                    cm.on("cursorActivity", schedule);
                    cm.on("scroll",         schedule);
                    cm.on("viewportChange", schedule);
                    window.addEventListener("resize", schedule);
                    setTimeout(draw, 500);
                })();

                /* ── Sandbox ── */
                function buildHTML(code) {

                    return (
                        "<!DOCTYPE html><html><head></head><body><script>\n" +
                        "(function(){\n" +
                        "function serialize(v,d,s){\n" +
                        "  s=s||new Set();d=d||0;\n" +

                        '  if(tp==="string")return{t:"string",v:v};\n' +

                        '  if(typeof v==="object"){\n' +

                        '    if(v instanceof Error)return{t:"error",name:v.name,message:v.message,stack:(v.stack||"").split("\\n").slice(0,8).join("\\n")};\n' +
                        '    if(v instanceof Date)return{t:"date",v:v.toISOString()};\n' +
                        '    if(v instanceof RegExp)return{t:"regexp",v:v.toString()};\n' +
                        '    if(v instanceof Map){s.add(v);var en=[];var c=0;v.forEach(function(vv,k){if(c++<50)en.push([serialize(k,d+1,s),serialize(vv,d+1,s)]);});return{t:"map",entries:en,size:v.size};}\n' +
                        '    if(v instanceof Set){s.add(v);var si=[];var c2=0;v.forEach(function(vv){if(c2++<50)si.push(serialize(vv,d+1,s));});return{t:"set",items:si,size:v.size};}\n' +
                        '    s.add(v);var ct="";try{ct=(v.constructor&&v.constructor.name!=="Object")?v.constructor.name:"";}catch(e){}\n' +
                        "    var ks=Object.keys(v),et=[],mk=Math.min(ks.length,100);\n" +
                        '    for(var j=0;j<mk;j++){var k=ks[j];try{et.push([k,serialize(v[k],d+1,s)]);}catch(e){et.push([k,{t:"string",v:"[unreadable]"}]);}}\n' +
                        '    return{t:"object",entries:et,ctor:ct,truncated:ks.length>mk};\n' +
                        "  }\n" +
                        '  return{t:"string",v:String(v)};\n' +
                        "}\n" +
                        'function send(tp,pl){parent.postMessage({type:tp,payload:pl},"*");}\n' +
                        '["log","info","warn","error","debug"].forEach(function(lv){\n' +
                        '  console[lv]=function(){var a=Array.prototype.slice.call(arguments).map(function(x){return serialize(x);});send("console",{level:lv==="debug"?"log":lv,args:a,time:Date.now()});};\n' +
                        "});\n" +
                        'window.addEventListener("error",function(e){send("console",{level:"error",args:[serialize(e.error||e.message)],time:Date.now()});e.preventDefault();});\n' +
                        'window.addEventListener("unhandledrejection",function(e){send("console",{level:"error",args:[serialize(e.reason)],time:Date.now()});e.preventDefault();});\n' +
                        "var __t=performance.now(),__fn;\n" +
                        'try{__fn=new Function("return (async function(){\\n"+' +
                        cj +

                        'if(__fn){__fn().then(function(){send("done",{duration:performance.now()-__t,time:Date.now()});}).catch(function(e){send("console",{level:"error",args:[serialize(e)],time:Date.now()});send("done",{duration:performance.now()-__t,time:Date.now()});});}\n' +
